<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StepBook — Leitura Ativa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --bg:#030810;--bg2:#07111f;--bg3:#0d1a2e;
  --gold:#D4AF37;--gold2:#f5c842;--gold-dim:rgba(212,175,55,.08);--gold-dim2:rgba(212,175,55,.15);
  --border:rgba(212,175,55,.12);--border2:rgba(212,175,55,.25);
  --text:#fff;--text2:rgba(255,255,255,.55);--text3:rgba(255,255,255,.28);
  --green:#3aaa72;--red:#d05050;
  --r:8px;--r2:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}a{color:inherit;text-decoration:none}
button,input,textarea{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--r);font-weight:600;font-size:.80rem;letter-spacing:.06em;text-transform:uppercase;padding:10px 20px;transition:all .15s;white-space:nowrap;cursor:pointer}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--gold)}.btn-ghost:hover{border-color:var(--gold);background:var(--gold-dim)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{filter:brightness(1.1)}
.btn-sm{padding:7px 14px;font-size:.73rem}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* INPUTS */
.inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:.9rem;padding:11px 14px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
textarea.inp{resize:vertical;min-height:80px}

/* OVERLAY/MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.overlay.center{align-items:center}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2) var(--r2) 0 0;padding:28px 24px 36px;width:100%;max-width:460px;animation:slideUp .3s cubic-bezier(.22,1,.36,1)}
.overlay.center .modal{border-radius:var(--r2);animation:scaleIn .25s cubic-bezier(.22,1,.36,1)}
.modal-title{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:6px}
.modal-sub{font-size:.84rem;color:var(--text2);margin-bottom:20px}
.modal-actions{display:flex;gap:10px;margin-top:20px}.modal-actions .btn{flex:1}

/* SPINNER */
.spin{width:34px;height:34px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spinning .8s linear infinite}
.spin-sm{width:16px;height:16px;border-width:2px}

/* TOAST */
#toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9000;display:flex;flex-direction:column;gap:8px;pointer-events:none;align-items:center}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:11px 20px;font-size:.84rem;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideUp .3s;pointer-events:auto;white-space:nowrap}

/* PROGRESS */
.pbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .5s ease}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:18px 0}

/* SECTION LABEL */
.sec-lbl{display:flex;align-items:center;gap:10px;color:var(--gold);font-size:.70rem;font-weight:600;letter-spacing:.20em;text-transform:uppercase;margin-bottom:18px}
.sec-lbl::before,.sec-lbl::after{content:'';flex:1;max-width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.sec-lbl::after{background:linear-gradient(90deg,var(--gold),transparent)}

/* LOADING */
.loading{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.loading-logo{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold)}
.loading-steps{font-size:.82rem;color:var(--text2);text-align:center;line-height:2}

/* DROPZONE */
.dropzone{border:2px dashed var(--border2);border-radius:var(--r2);padding:36px 24px;text-align:center;background:var(--gold-dim);transition:all .2s;position:relative;cursor:pointer}
.dropzone:hover,.dropzone.over{border-color:var(--gold);background:var(--gold-dim2)}
.dropzone input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}

/* BOOK GRID */
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px}
.book-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer}
.book-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.book-cover{aspect-ratio:2/3;background:var(--bg3);position:relative;overflow:hidden}
.book-cover img{width:100%;height:100%;object-fit:cover}
.book-cover-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.book-cover-ov{position:absolute;inset:0;background:rgba(3,8,16,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;color:var(--gold);font-size:1.5rem}
.book-card:hover .book-cover-ov{opacity:1}
.book-meta{padding:10px 12px 4px}
.book-title{font-family:'Playfair Display',serif;font-size:.82rem;font-weight:700;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:2px}
.book-author{font-size:.70rem;color:var(--text3)}
.book-pct{font-size:.68rem;color:var(--gold);font-weight:600;margin-top:4px}
.book-actions{display:flex;justify-content:flex-end;gap:4px;padding:4px 8px 8px}
.book-act{background:none;border:none;color:var(--text3);font-size:.8rem;padding:4px 6px;border-radius:4px;transition:color .15s}
.book-act:hover{color:var(--gold)}.book-act.del:hover{color:var(--red)}

/* Q-BLOCK */
.qblock{background:var(--gold-dim);border:1px solid var(--border2);border-left:4px solid var(--gold);border-radius:0 var(--r) var(--r) 0;padding:22px;margin:28px 0}
.qblock-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.qdot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;animation:pulse 2s infinite}
.qbadge{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
.qquestion{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;line-height:1.65;margin-bottom:16px}
.q-good{display:flex;align-items:center;gap:8px;color:var(--green);font-size:.8rem;font-weight:600;padding:10px 14px;background:rgba(58,170,114,.08);border:1px solid rgba(58,170,114,.2);border-radius:var(--r)}
.q-close{color:var(--gold);font-size:.84rem;padding:10px 14px;background:var(--gold-dim);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:12px;line-height:1.5}
.q-retry{color:var(--red);font-size:.84rem;padding:10px 14px;background:rgba(208,80,80,.08);border:1px solid rgba(208,80,80,.2);border-radius:var(--r);margin-bottom:12px}
.mcq-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.mcq-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s;text-align:left;color:var(--text);font-size:.88rem}
.mcq-opt:hover{border-color:var(--border2)}
.mcq-opt.sel{border-color:var(--gold);background:var(--gold-dim)}
.mcq-opt.ok{border-color:var(--green);background:rgba(58,170,114,.08)}
.mcq-opt.bad{border-color:var(--red);background:rgba(208,80,80,.08)}
.opt-ltr{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--border2);color:var(--gold);font-size:.7rem;font-weight:700;flex-shrink:0}

/* READER */
.page-text{font-family:'Playfair Display',serif;font-size:1.05rem;line-height:1.85;color:rgba(255,255,255,.9);white-space:pre-wrap;word-break:break-word}
.page-lbl{text-align:center;color:var(--text3);font-size:.68rem;letter-spacing:.12em;margin-bottom:14px;user-select:none}
.locked-blur{filter:blur(6px);user-select:none;pointer-events:none}
.bmark{position:fixed;right:0;top:50%;transform:translateY(-50%);background:var(--gold);color:#000;font-size:.68rem;font-weight:700;letter-spacing:.06em;padding:8px 9px 13px;border-radius:6px 0 0 6px;writing-mode:vertical-rl;z-index:100;clip-path:polygon(0 0,100% 0,100% 85%,50% 100%,0 85%);border:none;cursor:pointer;transition:background .15s}
.bmark:hover{background:var(--gold2)}
.qbtn{position:fixed;bottom:28px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--gold);border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(212,175,55,.45);z-index:50;transition:transform .15s}
.qbtn:hover{transform:scale(1.1)}

/* CHAP PANEL */
.chap-panel{position:fixed;inset:0;z-index:300;display:flex}
.chap-back{flex:1;background:rgba(0,0,0,.5)}
.chap-drawer{width:280px;background:var(--bg2);border-left:1px solid var(--border2);overflow-y:auto;animation:slideLeft .25s cubic-bezier(.22,1,.36,1)}
.chap-item{display:flex;align-items:flex-start;gap:12px;padding:14px 20px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.chap-item:hover{background:var(--gold-dim)}
.chap-item.locked{opacity:.5}

/* SCORE WIDGET */
.score-ring{cursor:pointer;display:flex;align-items:center;gap:7px}

/* SHARE */
#share-canvas-preview{width:100%;border-radius:8px;border:1px solid var(--border2);margin-bottom:12px}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideLeft{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes spinning{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* MOBILE */
@media(max-width:768px){
  .btn{min-height:44px}.btn-sm{min-height:38px}
  .page-text{font-size:.97rem;line-height:1.75}
  .books-grid{grid-template-columns:repeat(2,1fr)!important}
  .qblock{padding:16px}
}
</style>
</head>
<body>

<script>
// ─── CONFIG ────────────────────────────────────────────
const SB_URL  = 'https://lmwjkmtdyalqvloudlla.supabase.co'
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxtd2prbXRkeWFscXZsb3VkbGxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NDQ2MzMsImV4cCI6MjA4OTEyMDYzM30.e4D-Cm2QJ2dxqtdoNUBMPq2sD5WbCo4eKYCxmYR36qE'
const LOGO    = 'https://i.ibb.co/Xkfz5QKL/sua-logo-stepbook.png'
const KEYS    = {'STEP-JAN26-X7K2':1,'STEP-FEV26-M3P9':1,'STEP-MAR26-Q5R1':1,'STEP-ABR26-T8W4':1,'STEP-MAI26-Y2N6':1,'STEP-JUN26-K9P3':1,'STEP-JUL26-H4F7':1,'STEP-AGO26-B6D1':1,'STEP-SET26-C3M8':1,'STEP-OUT26-Z5R2':1,'STEP-NOV26-W7K9':1,'STEP-DEZ26-J1P4':1}

// ─── INIT ───────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'
const db = supabase.createClient(SB_URL, SB_KEY, {auth:{persistSession:true,autoRefreshToken:true}})

// ─── STATE ──────────────────────────────────────────────
const S = {
  user:null, plan:'free', books:[], book:null,
  pages:[], questions:[], progress:0,
  screen:'loading', quoteText:'', reflPrompt:null,
  importStep:0, importError:null, importMsg:'',
}

// ─── UTILS ──────────────────────────────────────────────
const $ = id => document.getElementById(id)
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''
const isMob = () => /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)

function toast(msg, dur=3000) {
  const el = document.createElement('div')
  el.className='toast'; el.textContent=msg
  $('toasts').appendChild(el)
  setTimeout(()=>el.remove(), dur)
}

function render(screen) {
  S.screen = screen
  const app = $('app')
  if (screen==='loading')   return app.innerHTML = renderLoading()
  if (screen==='auth')      { app.innerHTML = renderAuth(); bindAuth(); return }
  if (screen==='library')   { app.innerHTML = renderLibrary(); bindLibrary(); return }
  if (screen==='importing') return app.innerHTML = renderImporting()
  if (screen==='reader')    { app.innerHTML = renderReader(); bindReader(); return }
}

// ─── AUTH ───────────────────────────────────────────────
async function initAuth() {
  try {
    const { data } = await db.auth.getSession()
    if (data?.session?.user) {
      S.user = data.session.user
      await loadPlan()
    } else {
      S.user = null
    }
  } catch { S.user = null }

  db.auth.onAuthStateChange(async (event, session) => {
    if (event==='SIGNED_IN' && session?.user) {
      S.user = session.user
      await loadPlan()
      await loadBooks()
      render('library')
    } else if (event==='SIGNED_OUT') {
      S.user=null; S.plan='free'; S.books=[]
      render('auth')
    }
  })
}

async function loadPlan() {
  if (!S.user) return
  try {
    const { data } = await db.from('profiles').select('plan,plan_expires_at').eq('id',S.user.id).single()
    S.plan = (data?.plan==='pro' && (!data.plan_expires_at || new Date(data.plan_expires_at)>new Date())) ? 'pro' : 'free'
  } catch { S.plan='free' }
}

async function activateKey(key) {
  const k = key.trim().toUpperCase()
  if (!KEYS[k]) return {ok:false,msg:'Chave inválida.'}
  const { data:used } = await db.from('used_keys').select('id').eq('key',k).single()
  if (used) return {ok:false,msg:'Chave já utilizada.'}
  const exp = new Date(Date.now()+30*86400000).toISOString()
  await db.from('profiles').update({plan:'pro',plan_expires_at:exp}).eq('id',S.user.id)
  await db.from('used_keys').insert({key:k,user_id:S.user.id})
  S.plan='pro'
  return {ok:true,msg:`Pro ativado! Válido até ${new Date(exp).toLocaleDateString('pt-BR')}.`}
}

// ─── BOOKS DB ───────────────────────────────────────────
async function loadBooks() {
  if (!S.user) return
  const { data } = await db.from('books').select('*').eq('user_id',S.user.id).order('added_at',{ascending:false})
  S.books = data ?? []
}

async function deleteBook(id) {
  await db.from('books').delete().eq('id',id)
  await db.storage.from('pdfs').remove([`${S.user.id}/${id}.pdf`]).catch(()=>{})
  await db.storage.from('covers').remove([`${S.user.id}/${id}.jpg`]).catch(()=>{})
}

async function updateProgress(id, pct) {
  await db.from('books').update({progress:pct}).eq('id',id).catch(()=>{})
  S.books = S.books.map(b=>b.id===id?{...b,progress:pct}:b)
  if (S.book?.id===id) S.book.progress=pct
}

async function updateQuestions(id, qs) {
  await db.from('books').update({questions:qs}).eq('id',id).catch(()=>{})
  S.books = S.books.map(b=>b.id===id?{...b,questions:qs}:b)
}

async function saveReflection(id, ref) {
  const book = S.books.find(b=>b.id===id)
  const refs = [...(book?.reflections??[]), ref]
  await db.from('books').update({reflections:refs}).eq('id',id).catch(()=>{})
  S.books = S.books.map(b=>b.id===id?{...b,reflections:refs}:b)
  if (S.book?.id===id) S.book.reflections=refs
}

async function loadPages(id) {
  const { data } = await db.from('book_pages').select('page_num,text').eq('book_id',id).order('page_num')
  if (data) S.pages = data.map(r=>({num:r.page_num,text:r.text}))
}

// ─── PDF PROCESSING ─────────────────────────────────────
async function readPDF(file) {
  const buf = await file.arrayBuffer()
  const pdf = await pdfjsLib.getDocument({data:buf}).promise
  const total = pdf.numPages
  const mob = isMob()
  const BATCH = mob ? 8 : total
  const pages = []

  for (let s=0; s<total; s+=BATCH) {
    const end = Math.min(s+BATCH, total)
    const batch = await Promise.all(
      Array.from({length:end-s}, (_,i) =>
        pdf.getPage(s+i+1).then(async pg => {
          const c = await pg.getTextContent()
          return {num:s+i+1, text:c.items.map(x=>x.str).join(' ').trim()}
        })
      )
    )
    pages.push(...batch)
    if (mob) {
      S.importMsg = `Lendo PDF… ${pages.length}/${total} páginas`
      updateImportUI()
      await new Promise(r=>setTimeout(r,0))
    }
  }
  return {pages, total}
}

function cleanPages(pages) {
  return pages.map(p=>({...p,
    text:p.text
      .replace(/(\w)\s+(\w)\s*-\s*/g,'$1$2')
      .replace(/-\n(\w)/g,'$1')
      .replace(/([a-záàâãéèêíïóôõöúüçñ,;])\n([a-záàâãéèêíïóôõöúüçñ])/gi,'$1 $2')
      .replace(/ {2,}/g,' ').trim()
  }))
}

function detectChapters(pages) {
  const pats = [
    /^(cap[íi]tulo\s+[\divxlcdmIVXLCDM]+[.\s:])/i,
    /^(chapter\s+\d+)/i,
    /^(parte\s+[\divxlcdmIVXLCDM]+)/i,
    /^(\d{1,2}\.\s{1,3}[A-ZÁÀÂÃÉÈÊÍÏÓÔÕÖÚÜ][^\n]{3,60})/m,
  ]
  const found = []
  for (const p of pages) {
    const first = p.text.split(/[\n.]/)[0].trim().slice(0,100)
    if (pats.some(re=>re.test(first))) found.push({title:first.slice(0,80),pageNum:p.num})
  }
  if (found.length < 2) {
    const count = Math.min(8, Math.max(4, Math.floor(pages.length/10)))
    const step  = Math.floor(pages.length/count)
    return Array.from({length:count},(_,i)=>({title:`Seção ${i+1}`,pageNum:pages[i*step]?.num??1,locked:i>0}))
  }
  return found.map((c,i)=>({...c,locked:i>0}))
}

function injectCheckpoints(qs, total) {
  const pts = [Math.floor(total*.25),Math.round(total*.5),Math.round(total*.75),total-1]
  for (const pt of pts) {
    if (!qs.some(q=>Math.abs(q.beforePage-pt)<=8)) {
      let bp=pt; while(qs.some(q=>q.beforePage===bp)) bp++
      qs.push({beforePage:bp,qtype:'mcq',type:'Checkpoint',
        question:'Pausa de compreensão — Qual afirmação representa melhor sua experiência até aqui?',
        options:['Estou compreendendo bem e consigo relacionar o conteúdo à minha vida','Ainda não conectei bem as ideias'],
        correct:0,answered:false,answer:null,quality:null,_auto:true})
    }
  }
  const sorted = qs.sort((a,b)=>a.beforePage-b.beforePage)
  for (let i=1;i<sorted.length;i++) if(sorted[i].beforePage<=sorted[i-1].beforePage) sorted[i].beforePage=sorted[i-1].beforePage+1
  return sorted
}

async function fetchMeta(title) {
  try {
    const r = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(title)}&maxResults=1`)
    const d = await r.json()
    const v = d.items?.[0]?.volumeInfo
    if (!v) return {}
    return {title:v.title||title,author:v.authors?.[0]||'',description:v.description||'',coverUrl:v.imageLinks?.thumbnail||''}
  } catch { return {} }
}

function guessEmoji(t='') {
  const s=t.toLowerCase()
  if(/psicolog|mente|habit/.test(s))return'🧠'
  if(/lider|gestão|negócio|empresa/.test(s))return'💼'
  if(/financ|invest|dinheiro/.test(s))return'💰'
  if(/filosofia|estoic|plato/.test(s))return'🏛️'
  if(/história|guerra/.test(s))return'⚔️'
  if(/romance|amor/.test(s))return'❤️'
  if(/ciência|física|biolog/.test(s))return'🔬'
  if(/código|software|programação/.test(s))return'💻'
  return'📖'
}

function cleanTitle(t='') {
  return t.replace(/[-_]/g,' ').replace(/\.(pdf|txt)$/i,'').replace(/\s+/g,' ').trim()
}

// ─── AI ─────────────────────────────────────────────────
async function callAI(action, payload) {
  const r = await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,payload})})
  if (!r.ok) throw new Error(`AI ${r.status}`)
  const d = await r.json()
  if (d.error) throw new Error(d.error)
  return d.result
}

async function genQuestions(pages, title, chapters, desc) {
  const total = pages.length
  const sample = [
    ...pages.slice(0,Math.min(25,total)),
    ...pages.slice(Math.floor(total*.4),Math.min(Math.floor(total*.4)+22,total)),
    ...pages.slice(Math.floor(total*.72),Math.min(Math.floor(total*.72)+22,total)),
  ]
  const text = sample.map(p=>`[PAGE ${p.num}]\n${p.text}`).join('\n\n')
  const chaps = chapters.map(c=>`${c.title} (pág ${c.pageNum})`).join(', ')
  try {
    const result = await callAI('makeQuestions',{text,title,chapters:chaps,description:desc||''})
    const parsed = typeof result==='string' ? JSON.parse(result) : result
    return Array.isArray(parsed) ? parsed : []
  } catch(e) { console.warn('genQuestions:',e.message); return [] }
}

async function evalAnswer(question, answer, context, bookTitle) {
  try {
    const result = await callAI('evalAnswer',{question,answer,context,bookTitle})
    return typeof result==='string' ? JSON.parse(result) : result
  } catch { return {score:50,feedback:'Boa tentativa!',correct:false} }
}

// ─── GAMIFICATION ───────────────────────────────────────
function calcScore(qs, refls, progress) {
  if (!qs?.length) return 0
  const totalPgs = S.book?.total_pages||1
  const curPg = Math.round((progress/100)*totalPgs)
  const vis = qs.filter(q=>q.beforePage<=curPg)
  if (!vis.length) return 0
  let earned=0, total=0
  for (const q of vis) {
    if (q.qtype==='mcq'||q.type==='Checkpoint') { total+=1; if(q.quality==='good') earned+=1 }
    else { total+=2; if(q.quality==='good') earned+=2; else if(q.quality==='close') earned+=1 }
  }
  const goodRefls = (refls||[]).filter(r=>r._milestone&&r.quality==='good')
  total += goodRefls.length; earned += goodRefls.length
  return total>0 ? Math.min(100,Math.round((earned/total)*100)) : 0
}

function getLevel(score) {
  if (score>=85) return {label:'Mestre do Conteúdo',emoji:'🏆',color:'#f5c842'}
  if (score>=70) return {label:'Analista de Ideias',emoji:'🎯',color:'#D4AF37'}
  if (score>=50) return {label:'Leitor Crítico',emoji:'🔍',color:'#3aaa72'}
  if (score>=30) return {label:'Leitor Ativo',emoji:'📖',color:'#6ab0de'}
  return {label:'Leitor Iniciante',emoji:'🌱',color:'rgba(255,255,255,.5)'}
}

// ─── MODAL HELPER ───────────────────────────────────────
function showModal(html, center=false) {
  const ov = document.createElement('div')
  ov.className = 'overlay'+(center?' center':'')
  ov.id = '_modal'
  ov.innerHTML = `<div class="modal">${html}</div>`
  ov.addEventListener('click', e=>{if(e.target===ov)ov.remove()})
  document.body.appendChild(ov)
}
function closeModal() { $('_modal')?.remove() }

// ─── READER LOCK ────────────────────────────────────────
function isLocked(pageNum) {
  if (!S.book) return false
  const chaps = S.book.chapters||[]
  if (!chaps.length) return false
  let ownerIdx=-1
  for (let i=0;i<chaps.length;i++) if(chaps[i].pageNum<=pageNum) ownerIdx=i
  if (ownerIdx<=0) return false
  const ch = chaps[ownerIdx]
  const gate = [...S.questions].reverse().find(q=>q.beforePage<ch.pageNum)
  if (!gate) return false
  return gate.quality!=='good'
}

function bindLibrary() {
  $('btn-out')?.addEventListener('click',()=>db.auth.signOut())
  $('btn-pro')?.addEventListener('click',showPaywall)

  // DROPZONE — input cobre toda a área
  const dz=$('dropzone'), fi=$('file-input')

    el.addEventListener('click',()=>{

      e.stopPropagation()

    inp.addEventListener('change',async e=>{

      showDeleteModal(btn.dataset.del, btn.dataset.title)
    })

// ─── IMPORT ─────────────────────────────────────────────
function startImport(file) {
  // Validação
  if (!file) { toast('Nenhum arquivo selecionado.'); return }
  const name = file.name||''
  if (!name.toLowerCase().includes('.pdf') && file.type && !file.type.includes('pdf')) {
    toast('Por favor, selecione um arquivo PDF.'); return
  }
  const pro = S.plan==='pro'
  if (!pro && S.books.length>=1) { showPaywall(); return }
  runImport(file)
}

async function runImport(file) {
  S.importError=null; S.importStep=0; S.importMsg=''; render('importing')

  try {
    // STEP 0 — Salvar PDF no Storage ANTES de qualquer processamento
    // Isso testa conectividade e garante que o arquivo está seguro
    S.importMsg='Enviando PDF...'; updateImportUI()

    const rawTitle = cleanTitle(file.name||'Livro')
    const tempId = crypto.randomUUID()
    const pdfPath = `${S.user.id}/${tempId}.pdf`

    S.importMsg=`Salvando PDF (${(file.size/1024/1024).toFixed(1)}MB)...`; updateImportUI()
    const { error: upErr } = await db.storage.from('pdfs').upload(pdfPath, file, {upsert:true})
    if (upErr) throw new Error(`Falha ao salvar PDF: ${upErr.message}`)
    S.importMsg='PDF salvo! Processando...'; updateImportUI()

    // STEP 1 — Ler PDF com PDF.js
    S.importStep=1; S.importMsg='Lendo o PDF...'; updateImportUI()
    let pages=[], total=0
    try {
      const r = await readPDF(file)
      pages=cleanPages(r.pages); total=r.total
      S.importMsg=`${total} páginas lidas`; updateImportUI()
    } catch(e) {
      // PDF.js falhou — criar livro vazio, páginas serão carregadas depois
      console.warn('PDF.js falhou:', e.message)
      total=1
      pages=[{num:1, text:'Texto não disponível — erro ao ler PDF.'}]
      S.importMsg='Aviso: leitura parcial. Continuando...'; updateImportUI()
    }

    // STEP 2 — Metadados + Capítulos
    S.importStep=2; S.importMsg='Buscando informações...'; updateImportUI()
    let meta={}, chapters
    try {
      ;[meta, chapters] = await Promise.all([
        fetchMeta(rawTitle),
        Promise.resolve(detectChapters(pages))
      ])
    } catch { meta={}; chapters=detectChapters(pages) }
    const title = meta.title||rawTitle

    // STEP 3 — Perguntas
    S.importStep=3; S.importMsg='Gerando perguntas...'; updateImportUI()
    let questions=[]
    try {
      const generated = await Promise.race([
        genQuestions(pages,title,chapters,meta.description||''),
        new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),40000))
      ])
      if (generated?.length) questions=generated
    } catch(e) { console.warn('Perguntas:', e.message) }
    questions = injectCheckpoints(questions, total)

    // STEP 4 — Salvar livro no banco
    S.importStep=4; S.importMsg='Salvando na biblioteca...'; updateImportUI()

    const {data:saved, error:saveErr} = await db.from('books').insert({
      user_id:     S.user.id,
      title:       title,
      author:      meta.author||'Autor desconhecido',
      cover_url:   meta.coverUrl||null,
      emoji:       guessEmoji(title),
      description: (meta.description||'').slice(0,500),
      chapters:    chapters,
      questions:   questions,
      reflections: [],
      total_pages: total,
      progress:    0,
      added_at:    new Date().toISOString(),
      updated_at:  new Date().toISOString(),
    }).select('id').single()

    if (saveErr) throw new Error(`Banco: ${saveErr.message}`)
    const bookId = saved.id

    // Renomear PDF para o ID real do livro
    db.storage.from('pdfs').move(pdfPath, `${S.user.id}/${bookId}.pdf`).catch(()=>{})

    S.importMsg='Abrindo...'; updateImportUI()
    await loadBooks()
    const book = S.books.find(b=>b.id===bookId) || {
      id:bookId, title, author:meta.author||'Autor desconhecido',
      cover_url:meta.coverUrl||null, emoji:guessEmoji(title),
      chapters, questions, reflections:[], total_pages:total, progress:0
    }
    openBook(book, pages)

    // Páginas em background
    if (pages.length>1) savePagesBackground(bookId, pages)

  } catch(err) {
    console.error('[Import]', err)
    S.importError = err.message||'Erro desconhecido.'
    render('importing')
  }
}

function savePagesBackground(bookId, pages) {
  const mob = isMob()
  const BATCH = mob ? 15 : 80
  ;(async()=>{
    for (let i=0;i<pages.length;i+=BATCH) {
      const rows = pages.slice(i,i+BATCH).map(p=>({book_id:bookId,page_num:p.num,text:p.text}))
      await db.from('book_pages').upsert(rows,{onConflict:'book_id,page_num'}).catch(()=>{})
      if (mob) await new Promise(r=>setTimeout(r,80))
    }
  })()
}

async function openBook(book, preloaded) {
  // Garantir locks corretos
  if (book.chapters?.length) book={...book,chapters:book.chapters.map((c,i)=>({...c,locked:i>0}))}
  S.book=book; S.questions=book.questions||[]; S.progress=book.progress||0
  S.pages=preloaded||[]; S.quoteText=''; S.reflPrompt=null
  render('reader')
  if (!S.pages.length) { await loadPages(book.id); renderPages() }
}

    S.quoteText=sel; showShareModal('stories')
  })

  const body=$('rbody')
  let scrollTimer
  body.addEventListener('scroll',()=>{
    clearTimeout(scrollTimer); scrollTimer=setTimeout(()=>{
      const pct=Math.round((body.scrollTop/(body.scrollHeight-body.clientHeight))*100)
      const v=Math.min(100,Math.max(0,pct||0))
      S.progress=v
      $('rprog').style.width=v+'%'
      $('bmark').textContent=v+'%'
      updateProgress(S.book.id,v)
      updateScoreWidget()

      if(v>=60&&(S.book.progress||0)<60){
        const already=(S.book.reflections||[]).some(r=>r._milestone===60)
        if(!already){S.reflPrompt=60;showReflPrompt()}
      }
      if(v>=100&&(S.book.progress||0)<100){
        const already=(S.book.reflections||[]).some(r=>r._milestone===100)
        if(!already){S.reflPrompt=100;showReflPrompt()}
        else setTimeout(()=>showCompletionScreen(),800)
      }
    },120)
  })

}

function renderPages() {
  const c=$('rpages'); if(!c)return
  if(!S.pages.length){
    c.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh"><div class="spin"></div><p style="color:var(--text2);margin-top:12px">Carregando…</p></div>`
    return
  }
  const INIT=15
  c.innerHTML=S.pages.slice(0,INIT).map(renderPage).join('')
  const rest=S.pages.slice(INIT)
  if(rest.length){
    const sen=document.createElement('div'); sen.id='pg-sentinel'; sen.style.height='1px'
    c.appendChild(sen)
    let ri=0; const CHUNK=10
    const obs=new IntersectionObserver(entries=>{
      if(!entries[0].isIntersecting)return
      const chunk=rest.slice(ri,ri+CHUNK); if(!chunk.length){obs.disconnect();sen.remove();return}
      chunk.forEach(pg=>{const d=document.createElement('div');d.innerHTML=renderPage(pg);c.insertBefore(d.firstElementChild,sen)})
      bindQBlocks(); ri+=CHUNK
      if(ri>=rest.length){obs.disconnect();sen.remove()}
    },{rootMargin:'400px'})
    obs.observe(sen)
  }
  bindQBlocks()
}

function renderPage(p) {
  const locked=isLocked(p.num)
  const qs=S.questions.map((q,qi)=>({...q,_qi:qi})).filter(q=>q.beforePage===p.num)
  return `<div id="pg-${p.num}">
    <div class="page-lbl">— pág. ${p.num} —</div>
    <div class="page-text ${locked?'locked-blur':''}">${esc(p.text)}</div>
    ${qs.map(renderQBlock).join('')}
  </div>`
}

function renderQBlock(q) {
  if(q.quality==='good') return `<div class="qblock" data-qi="${q._qi}" style="border-left-color:var(--green)">
    <div class="qblock-hdr"><div class="qdot" style="background:var(--green)"></div><span class="qbadge" style="color:var(--green)">${q.type||'Quiz'}</span></div>
    <p class="qquestion">${esc(q.question)}</p>
    ${q.feedback?`<p style="font-size:.82rem;color:rgba(255,255,255,.42);font-style:italic;margin-bottom:10px">"${esc(q.feedback)}"</p>`:''}
    <div class="q-good"><span>✓</span> Ótima reflexão! Próximo capítulo desbloqueado 🔓</div>
  </div>`

  if(q.qtype==='mcq'){
    const lets=['A','B','C','D']
    const opts=(q.options||[]).map((opt,i)=>{
      let cls='mcq-opt'
      if(q.answered){if(i===q.correct)cls+=' ok';else if(i===q.selectedOpt)cls+=' bad'}
      else if(i===q.selectedOpt)cls+=' sel'
      return `<button class="${cls}" data-qi="${q._qi}" data-oi="${i}" ${q.answered?'disabled':''}><span class="opt-ltr">${lets[i]||i}</span>${esc(opt)}</button>`
    }).join('')
    const badge=q.type==='Checkpoint'?'⏸ Checkpoint':'🎯 Quiz'
    return `<div class="qblock" data-qi="${q._qi}" ${q.type==='Checkpoint'?'style="border-left-color:var(--gold2)"':''}>
      <div class="qblock-hdr"><div class="qdot"></div><span class="qbadge">${badge}</span></div>
      ${q.chapterTitle?`<span style="font-size:.68rem;color:var(--text3);display:block;margin-bottom:8px">📖 ${esc(q.chapterTitle)}</span>`:''}
      <p class="qquestion">${esc(q.question)}</p>
      <div class="mcq-opts">${opts}</div>
      ${!q.answered?`<button class="btn btn-gold btn-sm mcq-confirm" data-qi="${q._qi}" ${q.selectedOpt==null?'disabled':''}>Confirmar →</button>`:''}
      ${q.answered&&q.quality==='retry'?`<div class="q-retry">Quase lá! Releia o trecho e tente novamente. 💪</div>
        <button class="btn btn-ghost btn-sm mcq-retry" data-qi="${q._qi}" style="margin-top:6px">Tentar novamente</button>`:''}
    </div>`
  }

  return `<div class="qblock" data-qi="${q._qi}">
    <div class="qblock-hdr"><div class="qdot"></div><span class="qbadge">Reflexão</span></div>
    ${q.chapterTitle?`<span style="font-size:.68rem;color:var(--text3);display:block;margin-bottom:8px">📖 ${esc(q.chapterTitle)}</span>`:''}
    <p class="qquestion">${esc(q.question)}</p>
    ${q.answered&&q.quality==='close'?`<div class="q-close">💡 ${esc(q.feedback||'Boa reflexão! Aprofunde um pouco mais.')}</div>`:''}
    ${q.answered&&q.quality==='retry'?`<div class="q-retry">🔄 ${esc(q.feedback||'Tente conectar mais com o conteúdo.')}</div>`:''}
    <textarea class="inp q-ta" data-qi="${q._qi}" placeholder="Escreva sua reflexão aqui…" rows="4" style="margin-bottom:10px">${esc(q.answer||'')}</textarea>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-gold btn-sm q-submit" data-qi="${q._qi}">Enviar →</button>
      ${q.answered?`<button class="btn btn-ghost btn-sm q-retry-txt" data-qi="${q._qi}">Reescrever</button>`:''}
      <span style="font-size:.70rem;color:var(--text3);margin-left:auto">mín. 20 chars</span>
    </div>
  </div>`
}

function bindQBlocks() {
  document.querySelectorAll('.mcq-opt:not([disabled])').forEach(btn=>{
    btn.addEventListener('click',()=>patchQ(+btn.dataset.qi,{selectedOpt:+btn.dataset.oi}))
  })
  document.querySelectorAll('.mcq-confirm').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const qi=+btn.dataset.qi, q=S.questions[qi]
      const ok=q.selectedOpt===q.correct
      patchQ(qi,{answered:true,quality:ok?'good':'retry',answer:q.options[q.selectedOpt]})
      if(!ok)toast('Resposta incorreta. Tente novamente!')
      updateScoreWidget()
    })
  })
  document.querySelectorAll('.mcq-retry').forEach(btn=>{
    btn.addEventListener('click',()=>patchQ(+btn.dataset.qi,{answered:false,selectedOpt:null,quality:null}))
  })
  document.querySelectorAll('.q-submit').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const qi=+btn.dataset.qi, q=S.questions[qi]
      const ta=document.querySelector(`.q-ta[data-qi="${qi}"]`)
      const text=ta?.value?.trim()||''
      if(text.length<20){toast('Escreva pelo menos algumas palavras 😊');return}
      btn.disabled=true; btn.innerHTML='<span class="spin spin-sm"></span> Avaliando…'
      try {
        const pg=S.pages.find(p=>p.num===(q.beforePage||1))
        const res=await evalAnswer(q.question,text,pg?.text||'',S.book?.title||'')
        const sc=res?.score??50
        const quality=sc>=70?'good':sc>=40?'close':'retry'
        patchQ(qi,{answered:true,answer:text,quality,feedback:res?.feedback,score:sc})
        updateScoreWidget()
      } catch { toast('Erro ao avaliar. Tente novamente.'); btn.disabled=false; btn.innerHTML='Enviar →' }
    })
  })
  document.querySelectorAll('.q-retry-txt').forEach(btn=>{
    btn.addEventListener('click',()=>patchQ(+btn.dataset.qi,{answered:false,quality:null,feedback:null}))
  })
}

function patchQ(idx, patch) {
  S.questions=S.questions.map((q,i)=>i===idx?{...q,...patch}:q)
  updateQuestions(S.book.id,S.questions)
  const block=document.querySelector(`.qblock[data-qi="${idx}"]`)
  if(block){block.outerHTML=renderQBlock({...S.questions[idx],_qi:idx});bindQBlocks()}
}

async function buildFeedCard(canvas, bookTitle) {
  const ctx=canvas.getContext('2d'), W=1080, H=1080
  canvas.width=W;canvas.height=H
  const bg=ctx.createLinearGradient(0,0,0,H)
  bg.addColorStop(0,'#080c14');bg.addColorStop(1,'#101820')
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H)
  const bar=ctx.createLinearGradient(0,0,W,0)
  bar.addColorStop(0,'transparent');bar.addColorStop(.15,'#D4AF37');bar.addColorStop(.85,'#D4AF37');bar.addColorStop(1,'transparent')
  ctx.fillStyle=bar;ctx.fillRect(0,0,W,5)
  const logo=await loadImg(LOGO)
  if(logo){ctx.save();ctx.shadowColor='#D4AF37';ctx.shadowBlur=15;ctx.drawImage(logo,W-125,18,50,50);ctx.restore()}
  ctx.fillStyle='#D4AF37';ctx.font='bold 20px sans-serif';ctx.textAlign='right';ctx.fillText('StepBook',W-135,52);ctx.textAlign='left'
  const book=S.book,CX=80,CY=180,CW=285,CH=430
  const coverSrc=book?.cover_url||(book?.cover_b64?`data:image/jpeg;base64,${book.cover_b64}`:null)
  if(coverSrc){await new Promise(res=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{ctx.save();ctx.shadowColor='rgba(0,0,0,.9)';ctx.shadowBlur=40;ctx.shadowOffsetX=10;ctx.drawImage(img,CX,CY,CW,CH);ctx.restore();ctx.strokeStyle='#D4AF37';ctx.lineWidth=2;ctx.strokeRect(CX,CY,CW,CH);res()};img.onerror=res;img.src=coverSrc})}
  else{ctx.fillStyle='#0d1a2e';ctx.fillRect(CX,CY,CW,CH);ctx.strokeStyle='#D4AF37';ctx.lineWidth=2;ctx.strokeRect(CX,CY,CW,CH);ctx.fillStyle='#D4AF37';ctx.font='70px serif';ctx.textAlign='center';ctx.fillText(book?.emoji||'📖',CX+CW/2,CY+CH/2+24);ctx.textAlign='left'}
  const RX=415
  ctx.fillStyle='#fff';ctx.font='bold 32px serif';wrapL(ctx,bookTitle,RX,270,565,44,3)
  ctx.fillStyle='rgba(255,255,255,.55)';ctx.font='400 20px sans-serif';ctx.fillText((book?.author||'').slice(0,45),RX,380)
  ctx.fillStyle='rgba(255,255,255,.1)';rRect(ctx,RX,460,540,8,4);ctx.fill()
  const pw=(S.progress/100)*540,pG=ctx.createLinearGradient(RX,0,RX+pw,0)
  pG.addColorStop(0,'#D4AF37');pG.addColorStop(1,'#f5c842');ctx.fillStyle=pG;rRect(ctx,RX,460,pw,8,4);ctx.fill()
  const sc=calcScore(S.questions,book?.reflections,S.progress),lv=getLevel(sc)
  ctx.fillStyle='#D4AF37';ctx.font='bold 15px sans-serif';ctx.fillText(`${S.progress}% lido · ${sc}% domínio ${lv.emoji}`,RX,494)
  const dG=ctx.createLinearGradient(80,0,W-80,0)
  dG.addColorStop(0,'transparent');dG.addColorStop(.2,'rgba(212,175,55,.6)');dG.addColorStop(.8,'rgba(212,175,55,.6)');dG.addColorStop(1,'transparent')
  ctx.strokeStyle=dG;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(80,680);ctx.lineTo(W-80,680);ctx.stroke()
  const ref=book?.reflections?.filter(r=>r.answered)?.[0]?.answer||`${S.progress}% do livro lido com leitura ativa no StepBook.`
  ctx.fillStyle='rgba(255,255,255,.78)';ctx.font='italic 400 22px serif';wrapL(ctx,`"${ref.slice(0,170)}"`,80,735,W-160,33,4)
  ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='400 14px sans-serif';ctx.textAlign='right';ctx.fillText('stepbook.vercel.app',W-80,H-40)
}

async function buildStoriesCard(canvas, quoteText, bookTitle) {
  const ctx=canvas.getContext('2d'), W=1080, H=1920
  canvas.width=W;canvas.height=H
  ctx.fillStyle='#060c18';ctx.fillRect(0,0,W,H)
  const glow=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,800)
  glow.addColorStop(0,'rgba(212,175,55,.06)');glow.addColorStop(1,'transparent')
  ctx.fillStyle=glow;ctx.fillRect(0,0,W,H)
  if(window.innerWidth>=768){for(let i=0;i<4000;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*.013})`;ctx.fillRect(Math.random()*W,Math.random()*H,1,1)}}
  const M=52;ctx.strokeStyle='rgba(212,175,55,.32)';ctx.lineWidth=1.5;ctx.strokeRect(M,M,W-M*2,H-M*2)
  const CL=64;ctx.strokeStyle='#D4AF37';ctx.lineWidth=2.5;ctx.lineCap='square'
  ;[[M,M,1,0,0,1],[W-M,M,-1,0,0,1],[M,H-M,1,0,0,-1],[W-M,H-M,-1,0,0,-1]].forEach(([x,y,sx,sy,ex,ey])=>{
    ctx.beginPath();ctx.moveTo(x+sx*CL,y+sy*CL);ctx.lineTo(x,y);ctx.lineTo(x+ex*CL,y+ey*CL);ctx.stroke()
    ctx.save();ctx.translate(x,y);ctx.rotate(Math.PI/4);ctx.fillStyle='#D4AF37';ctx.fillRect(-4,-4,8,8);ctx.restore()
  })
  const LS=100, LY=M+80
  const logo=await loadImg(LOGO)
  if(logo){ctx.save();ctx.shadowColor='rgba(212,175,55,.5)';ctx.shadowBlur=28;ctx.drawImage(logo,W/2-LS/2,LY,LS,LS);ctx.restore()}
  ctx.textAlign='center';ctx.fillStyle='#D4AF37';ctx.font='400 27px "Playfair Display",serif';ctx.fillText('S T E P B O O K',W/2,LY+LS+44)
  ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='400 17px "DM Sans",sans-serif';ctx.fillText('LEITURA ATIVA COM IA',W/2,LY+LS+72)
  const D1=LY+LS+108;drawDiv(ctx,W,D1)
  const PAD=88, MW=W-PAD*2, TY=D1+65
  const HDR='Li essa frase pelo ', HDRB='StepBook', HDRE=' que me fez refletir'
  const HSZ=27
  ctx.font=`400 ${HSZ}px "Playfair Display",serif`
  const wN=ctx.measureText(HDR).width, wE=ctx.measureText(HDRE).width
  ctx.font=`700 ${HSZ}px "Playfair Display",serif`
  const wB=ctx.measureText(HDRB).width
  const totH=wN+wB+wE, hx=W/2-totH/2
  let cy=TY+HSZ
  ctx.textAlign='left';ctx.fillStyle='rgba(255,255,255,.55)';ctx.font=`400 ${HSZ}px "Playfair Display",serif`;ctx.fillText(HDR,hx,cy)
  ctx.fillStyle='#D4AF37';ctx.font=`700 ${HSZ}px "Playfair Display",serif`;ctx.fillText(HDRB,hx+wN,cy)
  ctx.fillStyle='rgba(255,255,255,.55)';ctx.font=`400 ${HSZ}px "Playfair Display",serif`;ctx.fillText(HDRE,hx+wN+wB,cy)
  cy+=48
  const rawQ=quoteText.length>140?quoteText.slice(0,137)+'…':quoteText
  const qFull='\u201c'+rawQ+'\u201d'
  let qSz=50
  while(qSz>28){ctx.font=`italic 400 ${qSz}px "Playfair Display",serif`;if(wrapT(ctx,qFull,MW).length<=4)break;qSz-=3}
  ctx.font=`italic 400 ${qSz}px "Playfair Display",serif`
  const qLns=wrapT(ctx,qFull,MW), qLH=Math.round(qSz*1.55)
  let tSz=29
  while(tSz>20){ctx.font=`600 ${tSz}px "Playfair Display",serif`;if(wrapT(ctx,bookTitle,MW-60).length<=2)break;tSz-=2}
  ctx.font=`600 ${tSz}px "Playfair Display",serif`
  const tLns=wrapT(ctx,bookTitle,MW-60), tLH=Math.round(tSz*1.55)
  const FY=H-M-160, D2=FY-90, ZONE=D2-cy
  const BH=qLns.length*qLH+52+26+28+tLns.length*tLH
  cy+=Math.max(0,Math.round((ZONE-BH)/2))
  ctx.textAlign='center';ctx.fillStyle='rgba(244,239,234,.92)';ctx.font=`italic 400 ${qSz}px "Playfair Display",serif`
  for(const l of qLns){cy+=qLH;ctx.fillText(l,W/2,cy)}
  cy+=52;drawMiniDiv(ctx,W,cy);cy+=36
  ctx.fillStyle='rgba(212,175,55,.62)';ctx.font=`italic 400 26px "Playfair Display",serif`;ctx.fillText('— Livro —',W/2,cy)
  cy+=28;ctx.fillStyle='#D4AF37';ctx.font=`600 ${tSz}px "Playfair Display",serif`
  for(const l of tLns){cy+=tLH;ctx.fillText(l,W/2,cy)}
  drawDiv(ctx,W,D2)
  ctx.fillStyle='rgba(255,255,255,.48)';ctx.font='500 23px "DM Sans",sans-serif';ctx.fillText('stepbook.vercel.app',W/2,D2+56)
  ctx.fillStyle='rgba(212,175,55,.38)';ctx.font='italic 400 19px "Playfair Display",serif';ctx.fillText('Leia. Questione. Domine.',W/2,D2+90)
}

function drawDiv(ctx,W,y){
  const cx=W/2,hw=270
  const gl=ctx.createLinearGradient(cx-hw,0,cx-33,0);gl.addColorStop(0,'transparent');gl.addColorStop(1,'rgba(212,175,55,.65)')
  ctx.strokeStyle=gl;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx-hw,y);ctx.lineTo(cx-33,y);ctx.stroke()
  const gr=ctx.createLinearGradient(cx+33,0,cx+hw,0);gr.addColorStop(0,'rgba(212,175,55,.65)');gr.addColorStop(1,'transparent')
  ctx.strokeStyle=gr;ctx.beginPath();ctx.moveTo(cx+33,y);ctx.lineTo(cx+hw,y);ctx.stroke()
  ctx.fillStyle='#D4AF37';ctx.save();ctx.translate(cx,y);ctx.rotate(Math.PI/4);ctx.fillRect(-6,-6,12,12);ctx.restore()
  ;[-21,21].forEach(o=>{ctx.beginPath();ctx.arc(cx+o,y,2.2,0,Math.PI*2);ctx.fillStyle='rgba(212,175,55,.45)';ctx.fill()})
}

function drawMiniDiv(ctx,W,y){
  const cx=W/2,hw=115
  const g=ctx.createLinearGradient(cx-hw,0,cx+hw,0)
  g.addColorStop(0,'transparent');g.addColorStop(.4,'rgba(212,175,55,.45)');g.addColorStop(.6,'rgba(212,175,55,.45)');g.addColorStop(1,'transparent')
  ctx.strokeStyle=g;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx-hw,y);ctx.lineTo(cx+hw,y);ctx.stroke()
  ctx.beginPath();ctx.arc(cx,y,2,0,Math.PI*2);ctx.fillStyle='rgba(212,175,55,.55)';ctx.fill()
}

function wrapT(ctx,text,maxW){
  const ws=text.split(' ');let line='',lines=[]
  for(const w of ws){const t=line+w+' ';if(ctx.measureText(t).width>maxW&&line){lines.push(line.trim());line=w+' '}else line=t}
  if(line.trim())lines.push(line.trim());return lines
}

function wrapL(ctx,text,x,y,mw,lh,ml=99){
  const ws=text.split(' ');let l='',cy=y,n=0
  for(const w of ws){const t=l+w+' ';if(ctx.measureText(t).width>mw&&l){ctx.fillText(l.trim(),x,cy);l=w+' ';cy+=lh;n++;if(n>=ml){ctx.fillText('…',x,cy);return}}else l=t}
  if(l)ctx.fillText(l.trim(),x,cy)
}

function rRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath()
}

function loadImg(src){
  return new Promise(r=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>r(img);img.onerror=()=>r(null);img.src=src})
}

async function canvasToFile(canvas,title){
  if(!canvas)return null
  return new Promise(r=>canvas.toBlob(blob=>r(blob?new File([blob],`stepbook-${title.slice(0,20)}.png`,{type:'image/png'}):null),'image/png',1.0))
}

function dlCanvas(canvas,title,mode){
  if(!canvas)return
  const a=document.createElement('a');a.href=canvas.toDataURL('image/png',1.0);a.download=`stepbook-${mode}-${title.replace(/\s+/g,'-').slice(0,25)}.png`;a.click();toast('Imagem salva! ✅')
}

// ─── REFLECTION PROMPT ──────────────────────────────────
function showReflPrompt() {
  const modal=$('refl-modal'); if(!modal)return
  modal.innerHTML=`<div class="overlay center" id="refl-ov">
    <div class="modal" style="max-width:400px">
      <h3 class="modal-title">Você chegou a ${S.reflPrompt}% do livro!</h3>
      <p class="modal-sub">Registre uma reflexão sobre o que leu até aqui.</p>
      <textarea class="inp" id="refl-txt" rows="4" placeholder="O que mais te marcou até aqui?"></textarea>
      <div class="modal-actions" style="margin-top:14px">
        <button class="btn btn-ghost btn-sm" id="refl-skip">Pular</button>
        <button class="btn btn-gold btn-sm" id="refl-save">Salvar ✨</button>
      </div>
    </div>
  </div>`
  $('refl-ov').addEventListener('click',e=>{if(e.target===$('refl-ov'))modal.innerHTML=''})
  $('refl-skip').addEventListener('click',()=>modal.innerHTML='')
  $('refl-save').addEventListener('click',async()=>{
    const text=$('refl-txt').value.trim(); if(!text){toast('Escreva algo primeiro.');return}
    const ms=S.reflPrompt
    const ref={type:'text',answer:text,question:`Reflexão aos ${ms}%`,answered:true,quality:'good',_milestone:ms,addedAt:Date.now()}
    await saveReflection(S.book.id,ref); modal.innerHTML=''; toast('Reflexão salva! ✨')
    updateScoreWidget()
    if(ms===100) setTimeout(()=>showCompletionScreen(),600)
  })
}
