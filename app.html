<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StepBook — Leitura Ativa com IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Crimson+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
/* ── TOKENS ──────────────────────────────────────────── */
:root {
  --bg:#030810;--bg2:#07111f;--bg3:#0d1a2e;
  --surface:#0e1c30;--surface2:#152338;
  --border:rgba(222,173,42,.10);--border2:rgba(222,173,42,.22);--border3:rgba(222,173,42,.40);
  --text:#FFF;--text2:rgba(255,255,255,.55);--text3:rgba(255,255,255,.28);
  --gold:#DEAD2A;--gold2:#f5c842;
  --gold-dim:rgba(222,173,42,.08);--gold-dim2:rgba(222,173,42,.15);
  --green:#3aaa72;--red:#d05050;
  --radius:6px;--radius-lg:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.025;pointer-events:none;z-index:9999}
img{display:block;max-width:100%}a{color:inherit;text-decoration:none}button{cursor:pointer;font-family:inherit}input,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--gold)}

/* ── BUTTONS ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-weight:600;font-size:.80rem;letter-spacing:.08em;text-transform:uppercase;padding:11px 22px;transition:all .15s ease;white-space:nowrap}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:var(--gold2);transform:translateY(-1px)}.btn-gold:active{transform:translateY(0)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--gold)}.btn-ghost:hover{border-color:var(--gold);background:var(--gold-dim)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{filter:brightness(1.1)}
.btn-sm{padding:7px 14px;font-size:.73rem}.btn-lg{padding:14px 32px;font-size:.86rem}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* ── INPUTS ──────────────────────────────────────────── */
.input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:.90rem;padding:11px 14px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--gold)}textarea.input{resize:vertical;min-height:80px}

/* ── BADGE ───────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:.70rem;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
.badge-gold{background:var(--gold-dim2);color:var(--gold);border:1px solid var(--border2)}

/* ── DIVIDER ─────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:20px 0}

/* ── PROGRESS BAR ────────────────────────────────────── */
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .5s ease}

/* ── SECTION LABEL ───────────────────────────────────── */
.section-label{display:flex;align-items:center;gap:12px;color:var(--gold);font-size:.70rem;font-weight:600;letter-spacing:.20em;text-transform:uppercase;margin-bottom:20px}
.section-label::before,.section-label::after{content:'';flex:1;max-width:56px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.section-label::after{background:linear-gradient(90deg,var(--gold),transparent)}

/* ── OVERLAY / MODAL ─────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.overlay.center{align-items:center}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:28px 24px 36px;width:100%;max-width:460px;animation:slideUp .3s cubic-bezier(.22,1,.36,1)}
.overlay.center .modal{border-radius:var(--radius-lg);animation:scaleIn .25s cubic-bezier(.22,1,.36,1)}
.modal-title{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--text);margin-bottom:6px}
.modal-sub{font-size:.84rem;color:var(--text2);margin-bottom:24px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions .btn{flex:1}

/* ── SPINNER / LOADING ───────────────────────────────── */
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.loading-logo{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);letter-spacing:.05em}
.loading-steps{font-size:.82rem;color:var(--text2);text-align:center;max-width:280px;line-height:1.6}

/* ── Q-BLOCK ─────────────────────────────────────────── */
.q-block{background:var(--gold-dim);border:1px solid var(--border2);border-left:4px solid var(--gold);border-radius:0 var(--radius) var(--radius) 0;padding:24px;margin:32px 0}
.q-block-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.q-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.8s ease-in-out infinite;flex-shrink:0}
.q-badge{font-size:.63rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold)}
.q-question{font-family:'Playfair Display',serif;font-style:italic;font-size:1.05rem;color:var(--text);line-height:1.6;margin-bottom:18px}
.q-status-good{display:flex;align-items:center;gap:8px;color:var(--green);font-size:.8rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:10px 14px;background:rgba(58,170,114,.08);border:1px solid rgba(58,170,114,.2);border-radius:var(--radius)}
.q-status-close{color:var(--gold);font-size:.84rem;padding:12px 14px;background:var(--gold-dim);border:1px solid var(--border2);border-radius:var(--radius);margin-bottom:12px;line-height:1.5}
.q-status-retry{color:var(--red);font-size:.84rem;padding:12px 14px;background:rgba(208,80,80,.08);border:1px solid rgba(208,80,80,.2);border-radius:var(--radius);margin-bottom:12px}
.mcq-options{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.mcq-option{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;text-align:left;color:var(--text);font-size:.9rem}
.mcq-option:hover{border-color:var(--border2);background:var(--surface)}
.mcq-option.selected{border-color:var(--gold);background:var(--gold-dim)}
.mcq-option.correct{border-color:var(--green);background:rgba(58,170,114,.08)}
.mcq-option.wrong{border-color:var(--red);background:rgba(208,80,80,.08)}
.opt-letter{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--border2);color:var(--gold);font-size:.7rem;font-weight:700;flex-shrink:0}

/* ── LOCKED BLUR / BOOKMARK ──────────────────────────── */
.locked-blur{filter:blur(5px);user-select:none;pointer-events:none;transition:filter .5s ease}
.bookmark-btn{position:fixed;right:0;top:50%;transform:translateY(-50%);background:var(--gold);color:#000;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.06em;padding:8px 10px 12px;border-radius:6px 0 0 6px;cursor:pointer;border:none;writing-mode:vertical-rl;z-index:100;clip-path:polygon(0 0,100% 0,100% 85%,50% 100%,0 85%);transition:background .15s}
.bookmark-btn:hover{background:var(--gold2)}

/* ── READER BODY ─────────────────────────────────────── */
.reader-page-text{font-family:'Crimson Pro',serif;font-size:1.08rem;line-height:1.85;color:var(--text);white-space:pre-wrap;word-break:break-word;margin-bottom:8px}
.reader-page-label{text-align:center;color:var(--text3);font-size:.70rem;letter-spacing:.12em;margin-bottom:16px;user-select:none}
.quote-btn{position:fixed;bottom:28px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(222,173,42,.45);z-index:50;transition:transform .15s ease,box-shadow .15s ease}
.quote-btn:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(222,173,42,.6)}

/* ── TOAST ───────────────────────────────────────────── */
#toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 20px;font-size:.84rem;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideUp .3s ease;pointer-events:auto}

/* ── ANIMATIONS ──────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* ── SCREENS ─────────────────────────────────────────── */
.screen{display:none}
.screen.active{display:block}

/* ── DROPZONE ────────────────────────────────────────── */
.dropzone{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:32px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--gold-dim)}
.dropzone:hover,.dropzone.drag{border-color:var(--gold);background:var(--gold-dim2)}
.dropzone-icon{font-size:2rem;margin-bottom:12px}
.dropzone-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--text);margin-bottom:6px}
.dropzone-sub{font-size:.82rem;color:var(--text2)}

/* ── BOOK CARD ───────────────────────────────────────── */
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
.book-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer}
.book-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.book-cover{aspect-ratio:2/3;background:var(--bg3);position:relative;overflow:hidden}
.book-cover img{width:100%;height:100%;object-fit:cover}
.book-cover-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--surface);font-size:2rem}
.book-cover-overlay{position:absolute;inset:0;background:rgba(3,8,16,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;color:var(--gold);font-size:1.5rem}
.book-card:hover .book-cover-overlay{opacity:1}
.book-meta{padding:10px 12px 4px}
.book-title{font-family:'Playfair Display',serif;font-size:.82rem;font-weight:600;color:var(--text);line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:3px}
.book-author{font-size:.72rem;color:var(--text3)}
.book-pct{font-size:.68rem;color:var(--gold);font-weight:600;margin-top:4px}
.book-actions{display:flex;justify-content:flex-end;gap:4px;padding:4px 8px 8px}
.book-action-btn{background:none;border:none;color:var(--text3);font-size:.8rem;cursor:pointer;padding:4px 6px;border-radius:4px;transition:color .15s}
.book-action-btn:hover{color:var(--gold)}
.book-action-btn.del:hover{color:var(--red)}

/* ── CHAP PANEL ──────────────────────────────────────── */
.chap-panel{position:fixed;inset:0;z-index:300;display:flex}
.chap-backdrop{flex:1;background:rgba(0,0,0,.5)}
.chap-drawer{width:280px;background:var(--bg2);border-left:1px solid var(--border2);overflow-y:auto;animation:slideLeft .25s cubic-bezier(.22,1,.36,1)}
@keyframes slideLeft{from{transform:translateX(100%)}to{transform:translateX(0)}}
.chap-item{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.chap-item:hover{background:var(--gold-dim)}
.chap-item.locked{opacity:.55}
.chap-lock{font-size:.75rem}
.chap-name{font-size:.85rem;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chap-page{font-size:.70rem;color:var(--text3)}

/* ── SHARE MODAL CANVAS ──────────────────────────────── */
#share-canvas-preview{width:100%;border-radius:8px;border:1px solid var(--border2);margin-bottom:12px}
.share-box{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 14px;margin-bottom:10px}
.share-msg{font-size:.86rem;color:var(--gold);font-weight:700;letter-spacing:.02em}
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
</style>
</head>
<body>

<div id="toast-container"></div>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const SUPABASE_URL = 'https://lmwjkmtdyalqvloudlla.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxtd2prbXRkeWFscXZsb3VkbGxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NDQ2MzMsImV4cCI6MjA4OTEyMDYzM30.e4D-Cm2QJ2dxqtdoNUBMPq2sD5WbCo4eKYCxmYR36qE'
const LOGO_URL     = 'https://i.ibb.co/Xkfz5QKL/sua-logo-stepbook.png'
const CARD_BASE    = 'https://i.ibb.co/tpfkJpDG/dreamina-2026-03-15-6664-Remove-the-central-quote-text-Se-desej.jpg'
const VALID_KEYS   = {
  'STEP-JAN26-X7K2':1,'STEP-FEV26-M3P9':1,'STEP-MAR26-Q5R1':1,'STEP-ABR26-T8W4':1,
  'STEP-MAI26-Y2N6':1,'STEP-JUN26-K9P3':1,'STEP-JUL26-H4F7':1,'STEP-AGO26-B6D1':1,
  'STEP-SET26-C3M8':1,'STEP-OUT26-Z5R2':1,'STEP-NOV26-W7K9':1,'STEP-DEZ26-J1P4':1,
}

// PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true }
})

const S = {
  user: null,
  plan: 'free',
  books: [],
  currentBook: null,
  pages: [],
  questions: [],
  progress: 0,
  screen: 'loading', // loading | auth | library | importing | reader
  chapOpen: false,
  shareOpen: false,
  shareMode: 'feed',
  quoteText: '',
  reflPrompt: null,
  importStep: 0,
  importError: null,
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function toast(msg, dur = 3000) {
  const el = document.createElement('div')
  el.className = 'toast'
  el.textContent = msg
  document.getElementById('toast-container').appendChild(el)
  setTimeout(() => el.remove(), dur)
}

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
async function initAuth() {
  const { data, error } = await sb.auth.getSession()
  if (error || !data.session) {
    await sb.auth.signOut().catch(() => {})
    S.user = null
  } else {
    S.user = data.session.user
    await loadPlan()
  }

  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN') {
      S.user = session.user
      await loadPlan()
      await loadBooks()
      render('library')
    } else if (event === 'SIGNED_OUT') {
      S.user = null
      S.plan = 'free'
      S.books = []
      render('auth')
    } else if (event === 'TOKEN_REFRESHED') {
      S.user = session?.user ?? null
    }
  })
  render(S.user ? 'library' : 'auth')
}

async function signIn(email, password) {
  const { error } = await sb.auth.signInWithPassword({ email, password })
  if (error) throw error
}
async function signUp(email, password) {
  const { error } = await sb.auth.signUp({ email, password })
  if (error) throw error
  return true
}
async function signOut() {
  await sb.auth.signOut()
}

// ═══════════════════════════════════════════════════════
// PLAN
// ═══════════════════════════════════════════════════════
async function loadPlan() {
  if (!S.user) return
  const { data } = await sb.from('profiles').select('plan,plan_expires_at').eq('id', S.user.id).single()
  if (data?.plan === 'pro') {
    const expired = data.plan_expires_at && new Date(data.plan_expires_at) < new Date()
    S.plan = expired ? 'free' : 'pro'
  }
}
async function activateKey(key) {
  const k = key.trim().toUpperCase()
  if (!VALID_KEYS[k]) return { ok: false, msg: 'Chave inválida.' }
  const { data: used } = await sb.from('used_keys').select('id').eq('key', k).single()
  if (used) return { ok: false, msg: 'Chave já utilizada.' }
  const expiresAt = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString()
  await sb.from('profiles').update({ plan: 'pro', plan_expires_at: expiresAt }).eq('id', S.user.id)
  await sb.from('used_keys').insert({ key: k, user_id: S.user.id })
  S.plan = 'pro'
  return { ok: true, msg: `Pro ativado! Válido até ${new Date(expiresAt).toLocaleDateString('pt-BR')}.` }
}

// ═══════════════════════════════════════════════════════
// BOOKS
// ═══════════════════════════════════════════════════════
async function loadBooks() {
  if (!S.user) return
  const { data } = await sb.from('books').select('*').eq('user_id', S.user.id).order('added_at', { ascending: false })
  S.books = data ?? []
}
async function saveBook(book) {
  const { pages, ...meta } = book
  const row = { ...meta, user_id: S.user.id, updated_at: new Date().toISOString() }
  const { data, error } = await sb.from('books').upsert(row, { onConflict: 'id' }).select().single()
  if (error) throw error
  await loadBooks()
  return data
}
async function deleteBook(bookId) {
  await sb.from('books').delete().eq('id', bookId)
  await sb.storage.from('pdfs').remove([`${S.user.id}/${bookId}.pdf`])
  await sb.storage.from('covers').remove([`${S.user.id}/${bookId}.jpg`])
  await loadBooks()
}
async function uploadPDF(bookId, file) {
  const path = `${S.user.id}/${bookId}.pdf`
  const { error } = await sb.storage.from('pdfs').upload(path, file, { upsert: true })
  if (error) throw error
  return path
}
async function uploadCover(bookId, file) {
  const path = `${S.user.id}/${bookId}.jpg`
  const { error } = await sb.storage.from('covers').upload(path, file, { upsert: true, contentType: 'image/jpeg' })
  if (error) throw error
  const { data } = sb.storage.from('covers').getPublicUrl(path)
  return data.publicUrl
}
async function updateProgress(bookId, progress) {
  await sb.from('books').update({ progress }).eq('id', bookId)
  S.books = S.books.map(b => b.id === bookId ? { ...b, progress } : b)
  if (S.currentBook?.id === bookId) S.currentBook.progress = progress
}
async function updateQuestions(bookId, questions) {
  await sb.from('books').update({ questions }).eq('id', bookId)
  S.questions = questions
  S.books = S.books.map(b => b.id === bookId ? { ...b, questions } : b)
}
async function saveReflection(bookId, reflection) {
  const book = S.books.find(b => b.id === bookId)
  const refs = [...(book?.reflections ?? []), reflection]
  await sb.from('books').update({ reflections: refs }).eq('id', bookId)
  S.books = S.books.map(b => b.id === bookId ? { ...b, reflections: refs } : b)
  if (S.currentBook?.id === bookId) S.currentBook.reflections = refs
}
async function loadPages(bookId) {
  const { data } = await sb.from('book_pages').select('page_num,text').eq('book_id', bookId).order('page_num')
  if (data) S.pages = data.map(r => ({ num: r.page_num, text: r.text }))
}

// ═══════════════════════════════════════════════════════
// PDF PROCESSING
// ═══════════════════════════════════════════════════════
async function readPDF(file) {
  const buf  = await file.arrayBuffer()
  const pdf  = await pdfjsLib.getDocument({ data: buf }).promise
  const pages = []
  for (let i = 1; i <= pdf.numPages; i++) {
    const page    = await pdf.getPage(i)
    const content = await page.getTextContent()
    const text    = content.items.map(x => x.str).join(' ').trim()
    pages.push({ num: i, text })
  }
  let coverB64 = null
  try {
    const page     = await pdf.getPage(1)
    const viewport = page.getViewport({ scale: 0.6 })
    const canvas   = document.createElement('canvas')
    canvas.width   = viewport.width; canvas.height = viewport.height
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise
    coverB64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1]
  } catch {}
  return { pages, coverB64, totalPages: pdf.numPages }
}

function detectChapters(pages) {
  const patterns = [
    /^(cap[íi]tulo\s+[\divxlcdmIVXLCDM]+[.\s:])/i,
    /^(chapter\s+\d+)/i,
    /^(parte\s+[\divxlcdmIVXLCDM]+)/i,
    /^(\d{1,2}\.\s{1,3}[A-ZÁÀÂÃÉÈÊÍÏÓÔÕÖÚÜ][^\n]{3,60})/m,
  ]
  const chapters = []
  for (const page of pages) {
    const first = page.text.split(/\n/)[0].trim()
    for (const re of patterns) {
      if (re.test(first)) { chapters.push({ title: first.slice(0,80), pageNum: page.num, locked: false }); break }
    }
  }
  if (chapters.length < 2) {
    const step = Math.floor(pages.length / 8)
    return Array.from({ length: 8 }, (_, i) => ({ title: `Seção ${i+1}`, pageNum: pages[i*step]?.num ?? 1, locked: i%2 !== 0 }))
  }
  return chapters.map((c, i) => ({ ...c, locked: i%2 !== 0 }))
}

function injectAutoMCQ(questions, total) {
  const pts = [
    { idx: Math.floor(total*.25), label:'25%' },
    { idx: Math.round(total*.50), label:'50%' },
    { idx: Math.round(total*.75), label:'75%' },
    { idx: total-1,               label:'100%' },
  ]
  for (const pt of pts) {
    if (!questions.some(q => Math.abs(q.beforePage - pt.idx) <= 3)) {
      questions.push({
        beforePage: pt.idx, qtype:'mcq', type:'Quiz',
        question: `Checkpoint ${pt.label}: Qual das afirmações melhor resume o que você leu até aqui?`,
        options: ['Faz um bom resumo do conteúdo lido','Não representa bem o que foi lido'],
        correct: 0, answered: false, answer: null, quality: null, _auto: true,
      })
    }
  }
  return questions.sort((a,b) => a.beforePage - b.beforePage)
}

async function fetchBookMeta(title) {
  try {
    const res  = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(title)}&maxResults=1`)
    const data = await res.json()
    const item = data.items?.[0]?.volumeInfo
    if (!item) return {}
    return { title: item.title||title, author: item.authors?.[0]||'Autor desconhecido', description: item.description||'', coverUrl: item.imageLinks?.thumbnail||'' }
  } catch { return {} }
}

function guessEmoji(title) {
  const t = title.toLowerCase()
  if (/psicolog|mente|comportamento|habit/.test(t)) return '🧠'
  if (/lider|gestão|empresa|negócio|empreend/.test(t)) return '💼'
  if (/financ|invest|dinheiro|riqueza/.test(t)) return '💰'
  if (/filosofia|plato|aristotel|estoic/.test(t)) return '🏛️'
  if (/história|guerra|impér/.test(t)) return '⚔️'
  if (/romance|amor|relacionamento/.test(t)) return '❤️'
  if (/ciência|física|biolog|evolução/.test(t)) return '🔬'
  if (/programação|código|software|tech/.test(t)) return '💻'
  return '📖'
}

function cleanTitle(t='') {
  return t.replace(/[-_]/g,' ').replace(/\.(pdf|txt)$/i,'').replace(/\s+/g,' ').trim()
}

async function callAI(action, payload) {
  const res = await fetch('/api/ai', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ action, payload })
  })
  if (!res.ok) throw new Error(`AI error: ${res.status}`)
  const data = await res.json()
  if (data.error) throw new Error(data.error)
  return data.result
}

async function cleanTextAI(pages, title) {
  const BATCH = 6; const cleaned = []
  for (let i = 0; i < pages.length; i += BATCH) {
    const batch = pages.slice(i, i+BATCH)
    const text  = batch.map(p => `[PAGE ${p.num}]\n${p.text}`).join('\n\n')
    try {
      const result = await callAI('cleanText', { text, title })
      const parsed = typeof result === 'string' ? JSON.parse(result) : result
      cleaned.push(...parsed)
    } catch { cleaned.push(...batch) }
  }
  return cleaned
}

async function makeQuestionsAI(pages, title, chapters) {
  const sample = pages.slice(0, Math.min(pages.length, 60))
  const text   = sample.map(p => `[PAGE ${p.num}]\n${p.text}`).join('\n\n')
  const chaps  = chapters.map(c => `${c.title} (pág ${c.pageNum})`).join(', ')
  try {
    const result = await callAI('makeQuestions', { text, title, chapters: chaps })
    const parsed = typeof result === 'string' ? JSON.parse(result) : result
    return Array.isArray(parsed) ? parsed : []
  } catch { return [] }
}

async function evalAnswerAI(question, answer, context) {
  const result = await callAI('evalAnswer', { question, answer, context })
  const parsed = typeof result === 'string' ? JSON.parse(result) : result
  return parsed
}

// READER HELPERS
// ═══════════════════════════════════════════════════════
function isPageLocked(pageNum) {
  if (!S.currentBook) return false
  for (const ch of (S.currentBook.chapters || [])) {
    if (!ch.locked) continue
    if (pageNum >= ch.pageNum) {
      const gate = S.questions.find(q => q.beforePage >= ch.pageNum-1 && q.beforePage <= ch.pageNum+1)
      if (gate && gate.quality === 'good') continue
      if (gate && gate.quality !== 'good') {
        const next = (S.currentBook.chapters||[]).find(c => !c.locked && c.pageNum > ch.pageNum)
        if (!next || pageNum < next.pageNum) return true
      }
    }
  }
  return false
}

async function generatePremiumCard(canvas, quoteText, bookTitle) {
  const ctx = canvas.getContext('2d')
  const W = 1080, H = 1920
  canvas.width = W; canvas.height = H

  // ── FUNDO ──────────────────────────────────────────────
  ctx.fillStyle = '#060c18'
  ctx.fillRect(0, 0, W, H)

  // Glow dourado central
  const glow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 800)
  glow.addColorStop(0,   'rgba(212,175,55,0.06)')
  glow.addColorStop(0.6, 'rgba(212,175,55,0.02)')
  glow.addColorStop(1,   'transparent')
  ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H)

  // Grain sutil
  for (let i = 0; i < 8000; i++) {
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.014})`
    ctx.fillRect(Math.random()*W, Math.random()*H, 1, 1)
  }

  // ── MOLDURA ─────────────────────────────────────────────
  const M = 52
  ctx.strokeStyle = 'rgba(212,175,55,0.32)'; ctx.lineWidth = 1.5
  ctx.strokeRect(M, M, W-M*2, H-M*2)

  // Cantos em L
  const CL = 64
  ctx.strokeStyle = '#D4AF37'; ctx.lineWidth = 2.5; ctx.lineCap = 'square'
  ;[[M,M,1,0,0,1],[W-M,M,-1,0,0,1],[M,H-M,1,0,0,-1],[W-M,H-M,-1,0,0,-1]]
  .forEach(([x,y,sx,sy,ex,ey]) => {
    ctx.beginPath()
    ctx.moveTo(x+sx*CL, y+sy*CL); ctx.lineTo(x,y); ctx.lineTo(x+ex*CL, y+ey*CL)
    ctx.stroke()
    ctx.save(); ctx.translate(x,y); ctx.rotate(Math.PI/4)
    ctx.fillStyle='#D4AF37'; ctx.fillRect(-4,-4,8,8); ctx.restore()
  })

  // ── LOGO (topo) ─────────────────────────────────────────
  const LOGO_SZ = 100
  const LOGO_Y  = M + 80  // topo da logo

  const logo = await new Promise(r => {
    const img = new Image(); img.crossOrigin = 'anonymous'
    img.onload = () => r(img); img.onerror = () => r(null); img.src = LOGO_URL
  })
  if (logo) {
    ctx.save()
    ctx.shadowColor = 'rgba(212,175,55,0.5)'; ctx.shadowBlur = 28
    ctx.drawImage(logo, W/2-LOGO_SZ/2, LOGO_Y, LOGO_SZ, LOGO_SZ)
    ctx.restore()
  }

  ctx.textAlign = 'center'
  ctx.fillStyle = '#D4AF37'
  ctx.font = '400 28px "Playfair Display", serif'
  ctx.fillText('S T E P B O O K', W/2, LOGO_Y + LOGO_SZ + 46)

  ctx.fillStyle = 'rgba(255,255,255,0.30)'
  ctx.font = '400 18px "DM Sans", sans-serif'
  ctx.fillText('LEITURA ATIVA COM IA', W/2, LOGO_Y + LOGO_SZ + 76)

  // ── DIVISOR 1 ───────────────────────────────────────────
  const DIV1 = LOGO_Y + LOGO_SZ + 112
  pDiv(ctx, W, DIV1)

  // ── TEXTO: layout top-down a partir de TXT_Y ───────────
  // Tudo calculado de cima para baixo — sem centralização
  const PAD_X  = 90          // margem lateral do texto
  const MAX_W  = W - PAD_X*2
  const TXT_Y  = DIV1 + 70   // onde começa o texto

  // ── Header acima da citação ──────────────────────────
  const HDR_SZ    = 28
  const HDR_GAP   = 48   // gap entre header e quote

  // Truncar quote — máx 140 chars
  const rawQ = quoteText.length > 140 ? quoteText.slice(0,137)+'…' : quoteText
  const quoteFull = '\u201c' + rawQ + '\u201d'

  // Fonte adaptativa: começa em 50px, reduz 3px até caber em ≤4 linhas
  let qSz = 50
  while (qSz > 28) {
    ctx.font = `italic 400 ${qSz}px "Playfair Display", serif`
    if (wrapTxt(ctx, quoteFull, MAX_W).length <= 4) break
    qSz -= 3
  }
  ctx.font = `italic 400 ${qSz}px "Playfair Display", serif`
  const qLines = wrapTxt(ctx, quoteFull, MAX_W)
  const qLH    = Math.round(qSz * 1.55)

  // Fonte adaptativa título: começa em 30px, reduz 2px até caber em ≤2 linhas
  let tSz = 30
  while (tSz > 20) {
    ctx.font = `600 ${tSz}px "Playfair Display", serif`
    if (wrapTxt(ctx, bookTitle, MAX_W-60).length <= 2) break
    tSz -= 2
  }
  ctx.font = `600 ${tSz}px "Playfair Display", serif`
  const tLines = wrapTxt(ctx, bookTitle, MAX_W-60)
  const tLH    = Math.round(tSz * 1.55)

  // Calcular altura total do bloco (incluindo header)
  const LBL_SZ  = 26
  const GAP_Q_D = 52   // quote → mini-div
  const GAP_D_L = 36   // mini-div → label
  const GAP_L_T = 28   // label → título
  const BLOCK_H = HDR_SZ + HDR_GAP + qLines.length*qLH + GAP_Q_D + LBL_SZ + GAP_D_L + GAP_L_T + tLines.length*tLH

  // Rodapé fixo: 180px do fundo
  const FOOT_Y  = H - M - 170
  const DIV2    = FOOT_Y - 100
  const ZONE_H  = DIV2 - TXT_Y

  // Centralizar verticalmente na zona — com clamp
  let cy = TXT_Y + Math.max(0, Math.round((ZONE_H - BLOCK_H) / 2))

  // ── Desenhar header ───────────────────────────────────
  ctx.textAlign = 'center'
  // Parte normal: "Li essa frase pelo "
  const HDR_NORMAL = 'Li essa frase pelo '
  const HDR_BOLD   = 'StepBook'
  const HDR_END    = ' que me fez refletir'

  ctx.font = `400 ${HDR_SZ}px "Playfair Display", serif`
  const wNormal = ctx.measureText(HDR_NORMAL).width
  const wBold   = (() => { ctx.font = `700 ${HDR_SZ}px "Playfair Display", serif`; return ctx.measureText(HDR_BOLD).width })()
  const wEnd    = (() => { ctx.font = `400 ${HDR_SZ}px "Playfair Display", serif`; return ctx.measureText(HDR_END).width })()
  const totalHdrW = wNormal + wBold + wEnd
  let hx = W/2 - totalHdrW/2

  cy += HDR_SZ  // baseline do header
  ctx.fillStyle = 'rgba(255,255,255,0.55)'
  ctx.font = `400 ${HDR_SZ}px "Playfair Display", serif`
  ctx.textAlign = 'left'
  ctx.fillText(HDR_NORMAL, hx, cy); hx += wNormal

  ctx.fillStyle = '#D4AF37'
  ctx.font = `700 ${HDR_SZ}px "Playfair Display", serif`
  ctx.fillText(HDR_BOLD, hx, cy); hx += wBold

  ctx.fillStyle = 'rgba(255,255,255,0.55)'
  ctx.font = `400 ${HDR_SZ}px "Playfair Display", serif`
  ctx.fillText(HDR_END, hx, cy)

  cy += HDR_GAP

  // Desenhar quote linha por linha
  ctx.textAlign = 'center'
  ctx.fillStyle = 'rgba(244,239,234,0.92)'
  ctx.font = `italic 400 ${qSz}px "Playfair Display", serif`
  for (const l of qLines) {
    cy += qLH
    ctx.fillText(l, W/2, cy)
  }

  // Mini divisor
  cy += GAP_Q_D
  pMiniDiv(ctx, W, cy)

  // Label
  cy += GAP_D_L
  ctx.fillStyle = 'rgba(212,175,55,0.65)'
  ctx.font = `italic 400 ${LBL_SZ}px "Playfair Display", serif`
  ctx.fillText('— Livro —', W/2, cy)

  // Título
  cy += GAP_L_T
  ctx.fillStyle = '#D4AF37'
  ctx.font = `600 ${tSz}px "Playfair Display", serif`
  for (const l of tLines) {
    cy += tLH
    ctx.fillText(l, W/2, cy)
  }

  // ── DIVISOR 2 ───────────────────────────────────────────
  pDiv(ctx, W, DIV2)

  // ── RODAPÉ ──────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.50)'
  ctx.font = '500 24px "DM Sans", sans-serif'
  ctx.fillText('stepbook.vercel.app', W/2, DIV2 + 58)

  ctx.fillStyle = 'rgba(212,175,55,0.40)'
  ctx.font = 'italic 400 19px "Playfair Display", serif'
  ctx.fillText('Leia. Questione. Domine.', W/2, DIV2 + 92)

  return canvas.toDataURL('image/png', 1.0)
}

// Divisor ornamental com losango e pontos
function pDiv(ctx, W, y) {
  const cx = W/2, hw = 280
  ;[[-hw,-35],[35,hw]].forEach(([a,b]) => {
    const g = ctx.createLinearGradient(cx+a,0,cx+b,0)
    g.addColorStop(0,'transparent'); g.addColorStop(1,'rgba(212,175,55,0.65)')
    if (b > 0) { g.addColorStop(0,'rgba(212,175,55,0.65)'); g.addColorStop(1,'transparent') }
    ctx.strokeStyle = g; ctx.lineWidth = 1
    ctx.beginPath(); ctx.moveTo(cx+a,y); ctx.lineTo(cx+b,y); ctx.stroke()
  })
  const gl = ctx.createLinearGradient(cx-hw,0,cx-35,0)
  gl.addColorStop(0,'transparent'); gl.addColorStop(1,'rgba(212,175,55,0.65)')
  ctx.strokeStyle=gl; ctx.lineWidth=1
  ctx.beginPath(); ctx.moveTo(cx-hw,y); ctx.lineTo(cx-35,y); ctx.stroke()
  const gr = ctx.createLinearGradient(cx+35,0,cx+hw,0)
  gr.addColorStop(0,'rgba(212,175,55,0.65)'); gr.addColorStop(1,'transparent')
  ctx.strokeStyle=gr
  ctx.beginPath(); ctx.moveTo(cx+35,y); ctx.lineTo(cx+hw,y); ctx.stroke()
  ctx.fillStyle='#D4AF37'
  ctx.save(); ctx.translate(cx,y); ctx.rotate(Math.PI/4); ctx.fillRect(-6,-6,12,12); ctx.restore()
  ;[-22,22].forEach(o => { ctx.beginPath(); ctx.arc(cx+o,y,2.2,0,Math.PI*2); ctx.fillStyle='rgba(212,175,55,0.45)'; ctx.fill() })
}

// Mini divisor
function pMiniDiv(ctx, W, y) {
  const cx = W/2, hw = 120
  const g = ctx.createLinearGradient(cx-hw,0,cx+hw,0)
  g.addColorStop(0,'transparent'); g.addColorStop(0.4,'rgba(212,175,55,0.45)')
  g.addColorStop(0.6,'rgba(212,175,55,0.45)'); g.addColorStop(1,'transparent')
  ctx.strokeStyle=g; ctx.lineWidth=1
  ctx.beginPath(); ctx.moveTo(cx-hw,y); ctx.lineTo(cx+hw,y); ctx.stroke()
  ctx.beginPath(); ctx.arc(cx,y,2,0,Math.PI*2); ctx.fillStyle='rgba(212,175,55,0.55)'; ctx.fill()
}

// Word-wrap
function wrapTxt(ctx, text, maxW) {
  const words = text.split(' '); const lines = []; let line = ''
  for (const w of words) {
    const test = line + w + ' '
    if (ctx.measureText(test).width > maxW && line) { lines.push(line.trim()); line = w+' ' }
    else line = test
  }
  if (line.trim()) lines.push(line.trim())
  return lines
}

function measureLines(ctx, t, w) { return wrapTxt(ctx, t, w) }

function bindLibrary() {
  // Sign out
  document.getElementById('btn-signout')?.addEventListener('click', signOut)

  // Upgrade
  document.getElementById('btn-upgrade')?.addEventListener('click', showPaywall)

  // Dropzone
  const dz   = document.getElementById('dropzone')
  const fi   = document.getElementById('file-input')

  dz.addEventListener('click', () => fi.click())
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag') })
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'))
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag')
    const file = e.dataTransfer.files[0]
    if (file) handleFileSelected(file)
  })
  fi.addEventListener('change', e => {
    const file = e.target.files?.[0]
    if (file) handleFileSelected(file)
  })

  // Book open
  document.querySelectorAll('[data-open]').forEach(el => {
    el.addEventListener('click', () => {
      const id   = el.dataset.open
      const book = S.books.find(b => b.id === id)
      if (book) openBook(book)
    })
  })

  // Cover change
  document.querySelectorAll('[data-cover]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation()
      const id = btn.dataset.cover
      document.getElementById(`cover-input-${id}`)?.click()
    })
  })
  document.querySelectorAll('[id^="cover-input-"]').forEach(input => {
    input.addEventListener('change', async e => {
      const file = e.target.files?.[0]
      if (!file) return
      const id = input.id.replace('cover-input-','')
      try {
        const url = await uploadCover(id, file)
        S.books = S.books.map(b => b.id === id ? { ...b, cover_url: url } : b)
        render('library')
        toast('Capa atualizada!')
      } catch { toast('Erro ao atualizar capa.') }
    })
  })

  // Delete
  document.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation()
      showDeleteModal(btn.dataset.del, btn.dataset.title)
    })
  })
}

function handleFileSelected(file) {
  if (!file.name.endsWith('.pdf')) { toast('Selecione um arquivo PDF.'); return }
  const isPro = S.plan === 'pro'
  if (!isPro && S.books.length >= 1) { showPaywall(); return }
  runImport(file)
}

const IMPORT_STEPS = [
  'Lendo o PDF…','Buscando metadados do livro…','Detectando capítulos…',
  'Limpando texto com IA…','Gerando perguntas com IA…','Salvando na sua biblioteca…',
]

function renderImporting() {
  const step  = S.importStep
  const error = S.importError
  return `<div class="loading-overlay">
    <img src="${LOGO_URL}" style="width:72px;filter:drop-shadow(0 0 14px rgba(222,173,42,.5))" />
    <div class="loading-logo">StepBook</div>

      ? `<p style="color:var(--red);font-size:.88rem;text-align:center;max-width:280px">${error}</p>
         <button class="btn btn-ghost btn-sm" onclick="render('library')">← Voltar</button>`
      : `<div class="spinner"></div>
         <div class="loading-steps">
           ${IMPORT_STEPS.map((s,i) => `<div style="color:${i===step?'var(--gold)':i<step?'var(--green)':'var(--text3)'}">${i<step?'✓ ':i===step?'⟳ ':'○ '}${s}</div>`).join('')}
         </div>`
    }
  </div>`
}

async function runImport(file) {
  S.importError = null
  S.importStep  = 0
  render('importing')

  try {
    // Step 0
    const { pages, coverB64, totalPages } = await readPDF(file)

    // Step 1
    S.importStep = 1; updateImportStep()
    const rawTitle = cleanTitle(file.name)
    const meta = await fetchBookMeta(rawTitle)

    // Step 2
    S.importStep = 2; updateImportStep()
    const chapters = detectChapters(pages)

    // Step 3
    S.importStep = 3; updateImportStep()
    let cleanPages = pages
    try {
      const cleaned = await Promise.race([
        cleanTextAI(pages, meta.title||rawTitle),
        new Promise((_,r) => setTimeout(() => r(new Error('timeout')), 30000))
      ])
      if (cleaned?.length) cleanPages = cleaned
    } catch {}

    // Step 4
    S.importStep = 4; updateImportStep()
    let questions = []
    try {
      const generated = await Promise.race([
        makeQuestionsAI(cleanPages, meta.title||rawTitle, chapters),
        new Promise((_,r) => setTimeout(() => r(new Error('timeout')), 45000))
      ])
      if (generated?.length) questions = generated
    } catch {}
    questions = injectAutoMCQ(questions, totalPages)

    // Step 5
    S.importStep = 5; updateImportStep()
    const bookData = {
      title:       meta.title || rawTitle,
      author:      meta.author || 'Autor desconhecido',
      cover_b64:   coverB64,
      cover_url:   meta.coverUrl || null,
      emoji:       guessEmoji(meta.title||rawTitle),
      description: meta.description || '',
      chapters,
      questions,
      reflections: [],
      total_pages: totalPages,
      progress:    0,
      added_at:    new Date().toISOString(),
    }

    const saved = await saveBook(bookData)

    // Save pages to DB
    const pageRows = cleanPages.map(p => ({ book_id: saved.id, page_num: p.num, text: p.text }))
    for (let i = 0; i < pageRows.length; i += 50) {
      await sb.from('book_pages').upsert(pageRows.slice(i, i+50), { onConflict: 'book_id,page_num' })
    }

    // Upload PDF
    try { await uploadPDF(saved.id, file) } catch {}

    await loadBooks()
    const finalBook = S.books.find(b => b.id === saved.id) || { ...bookData, id: saved.id, pages: cleanPages }
    openBook(finalBook, cleanPages)
  } catch (err) {
    console.error(err)
    S.importError = `Erro ao importar: ${err.message}`
    render('importing')
  }
}

function updateImportStep() {
  const stepEls = document.querySelectorAll('.loading-steps div')
  if (!stepEls.length) return
  stepEls.forEach((el, i) => {
    el.style.color = i === S.importStep ? 'var(--gold)' : i < S.importStep ? 'var(--green)' : 'var(--text3)'
    const prefix = i < S.importStep ? '✓ ' : i === S.importStep ? '⟳ ' : '○ '
    el.textContent = prefix + IMPORT_STEPS[i]
  })
}

    S.quoteText = sel
    showShareModal('stories')
  })

  // Scroll progress
  const body = document.getElementById('reader-body')
  let scrollTimer
  body.addEventListener('scroll', () => {
    clearTimeout(scrollTimer)
    scrollTimer = setTimeout(() => {
      const pct = Math.round((body.scrollTop / (body.scrollHeight - body.clientHeight)) * 100)
      const v   = Math.min(100, Math.max(0, pct || 0))
      S.progress = v
      document.getElementById('reader-progress-fill').style.width = v + '%'
      document.getElementById('bookmark-btn').textContent = v + '%'
      updateProgress(S.currentBook.id, v)

      // Milestone reflections
      if (v >= 60 && (S.currentBook.progress||0) < 60) {
        const already = S.currentBook.reflections?.some(r => r._milestone === 60)
        if (!already) { S.reflPrompt = 60; showReflPrompt() }
      }
      if (v >= 100 && (S.currentBook.progress||0) < 100) {
        const already = S.currentBook.reflections?.some(r => r._milestone === 100)
        if (!already) { S.reflPrompt = 100; showReflPrompt() }
      }
    }, 100)
  })

  renderReaderPages()

function renderReaderPages() {
  const container = document.getElementById('reader-pages')
  if (!container) return
  if (!S.pages.length) {
    container.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh"><div class="spinner"></div><p style="color:var(--text2);margin-top:12px">Carregando páginas…</p></div>`
    return
  }

  container.innerHTML = S.pages.map(page => {
    const locked = isPageLocked(page.num)
    const pageQs = S.questions.map((q,qi) => ({...q,_qi:qi})).filter(q => q.beforePage === page.num || q.beforePage === page.num-1)
    return `<div id="page-${page.num}">
      <div class="reader-page-label">— pág. ${page.num} —</div>
      <div class="reader-page-text ${locked?'locked-blur':''}">${escHtml(page.text)}</div>
      ${pageQs.map(q => renderQBlock(q)).join('')}

  }).join('')

  // Bind Q blocks

function renderQBlock(q) {
  if (q.quality === 'good') {
    return `<div class="q-block" data-qi="${q._qi}">
      <div class="q-block-header"><div class="q-dot" style="background:var(--green)"></div><span class="q-badge" style="color:var(--green)">${q.type||'Quiz'}</span></div>
      <p class="q-question">${escHtml(q.question)}</p>
      <div class="q-status-good"><span>✓</span> Gate liberado · Próximo capítulo desbloqueado</div>
    </div>`
  }

  if (q.qtype === 'mcq') {
    const opts = (q.options||[]).map((opt,i) => {
      let cls = 'mcq-option'
      if (q.answered) {
        if (i === q.correct) cls += ' correct'
        else if (i === q.selectedOpt) cls += ' wrong'
      } else if (i === q.selectedOpt) cls += ' selected'
      return `<button class="${cls}" data-qi="${q._qi}" data-oi="${i}" ${q.answered?'disabled':''}>
        <span class="opt-letter">${i===0?'A':'B'}</span>${escHtml(opt)}
      </button>`
    }).join('')

    return `<div class="q-block" data-qi="${q._qi}">
      <div class="q-block-header"><div class="q-dot"></div><span class="q-badge">Quiz</span></div>
      <p class="q-question">${escHtml(q.question)}</p>
      <div class="mcq-options">${opts}</div>
      ${!q.answered ? `<button class="btn btn-gold btn-sm mcq-confirm" data-qi="${q._qi}" ${q.selectedOpt===undefined||q.selectedOpt===null?'disabled':''}>Confirmar resposta</button>` : ''}
      ${q.answered && q.quality==='retry' ? `<div class="q-status-retry">Resposta incorreta. Revise o capítulo e tente novamente.</div>
        <button class="btn btn-ghost btn-sm mcq-retry" data-qi="${q._qi}">Tentar novamente</button>` : ''}
    </div>`
  }

  // Text answer
  return `<div class="q-block" data-qi="${q._qi}">
    <div class="q-block-header"><div class="q-dot"></div><span class="q-badge">Reflexão</span></div>
    <p class="q-question">${escHtml(q.question)}</p>
    ${q.answered && q.quality==='close' ? `<div class="q-status-close">💡 ${escHtml(q.feedback||'Boa tentativa! Aprofunde um pouco mais sua resposta.')}</div>` : ''}
    ${q.answered && q.quality==='retry' ? `<div class="q-status-retry">⚠️ ${escHtml(q.feedback||'Resposta muito superficial. Revise e tente novamente.')}</div>` : ''}
    <textarea class="input q-textarea" data-qi="${q._qi}" placeholder="Escreva sua reflexão aqui…" rows="4" style="margin-bottom:12px">${escHtml(q.answer||'')}</textarea>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-gold btn-sm q-submit" data-qi="${q._qi}">Enviar resposta</button>
      ${q.answered ? `<button class="btn btn-ghost btn-sm q-retry-text" data-qi="${q._qi}">Tentar novamente</button>` : ''}
    </div>
  </div>`
}

function bindQBlocks() {
  // MCQ option select
  document.querySelectorAll('.mcq-option:not([disabled])').forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.qi)
      const oi = parseInt(btn.dataset.oi)
      patchQuestion(qi, { selectedOpt: oi })
    })
  })

  // MCQ confirm
  document.querySelectorAll('.mcq-confirm').forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.qi)
      const q  = S.questions[qi]
      const ok = q.selectedOpt === q.correct
      patchQuestion(qi, { answered: true, quality: ok?'good':'retry', answer: q.options[q.selectedOpt] })
      if (!ok) toast('Resposta incorreta. Tente novamente!')
    })
  })

  // MCQ retry
  document.querySelectorAll('.mcq-retry').forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.qi)
      patchQuestion(qi, { answered: false, selectedOpt: null, quality: null })
    })
  })

  // Text submit
  document.querySelectorAll('.q-submit').forEach(btn => {
    btn.addEventListener('click', async () => {
      const qi   = parseInt(btn.dataset.qi)
      const q    = S.questions[qi]
      const ta   = document.querySelector(`.q-textarea[data-qi="${qi}"]`)
      const text = ta?.value?.trim() || ''
      if (text.length < 20) { toast('Escreva pelo menos 20 caracteres.'); return }
      btn.disabled = true
      btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px"></span> Avaliando…'
      try {
        const page   = S.pages.find(p => p.num === (q.beforePage||1))
        const result = await evalAnswerAI(q.question, text, page?.text||'')
        const score  = result?.score ?? 0
        const quality = score >= 70 ? 'good' : score >= 40 ? 'close' : 'retry'
        patchQuestion(qi, { answered: true, answer: text, quality, feedback: result?.feedback })
      } catch { toast('Erro ao avaliar. Tente novamente.'); btn.disabled = false; btn.textContent = 'Enviar resposta' }
    })
  })

  // Text retry
  document.querySelectorAll('.q-retry-text').forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.qi)
      patchQuestion(qi, { answered: false, quality: null, feedback: null })
    })
  })
}

function patchQuestion(idx, patch) {
  S.questions = S.questions.map((q,i) => i === idx ? {...q,...patch} : q)
  updateQuestions(S.currentBook.id, S.questions)
  // Re-render that q-block in place
  const block = document.querySelector(`.q-block[data-qi="${idx}"]`)
  if (block) {
    const q = {...S.questions[idx], _qi: idx}
    block.outerHTML = renderQBlock(q)
    // Rebind all q blocks
    bindQBlocks()
  }
}

async function renderFeedCard(canvas, bookTitle) {
  const ctx = canvas.getContext('2d')
  const W = 1080, H = 1080
  canvas.width = W; canvas.height = H

  const bg = ctx.createLinearGradient(0,0,0,H)
  bg.addColorStop(0,'#080c14'); bg.addColorStop(1,'#101820')
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H)

  const barG = ctx.createLinearGradient(0,0,W,0)
  barG.addColorStop(0,'transparent'); barG.addColorStop(.15,'#D4AF37')
  barG.addColorStop(.85,'#D4AF37'); barG.addColorStop(1,'transparent')
  ctx.fillStyle = barG; ctx.fillRect(0,0,W,5)

  // Logo
  const logo = await new Promise(r => { const img = new Image(); img.crossOrigin='anonymous'; img.onload=()=>r(img); img.onerror=()=>r(null); img.src=LOGO_URL })
  if (logo) { ctx.save(); ctx.shadowColor='#D4AF37'; ctx.shadowBlur=15; ctx.drawImage(logo,W-125,18,50,50); ctx.restore() }

  ctx.fillStyle='#D4AF37'; ctx.font='bold 20px sans-serif'
  ctx.textAlign='right'; ctx.fillText('StepBook',W-135,52); ctx.textAlign='left'

  // Cover
  const book = S.currentBook
  const coverSrc = book?.cover_url || (book?.cover_b64 ? `data:image/jpeg;base64,${book.cover_b64}` : null)
  const CX=80,CY=180,CW=285,CH=430
  if (coverSrc) {
    await new Promise(res => {
      const img=new Image(); img.crossOrigin='anonymous'
      img.onload=()=>{ ctx.save(); ctx.shadowColor='rgba(0,0,0,.9)'; ctx.shadowBlur=40; ctx.shadowOffsetX=10; ctx.drawImage(img,CX,CY,CW,CH); ctx.restore(); ctx.strokeStyle='#D4AF37'; ctx.lineWidth=2; ctx.strokeRect(CX,CY,CW,CH); res() }
      img.onerror=res; img.src=coverSrc
    })
  } else {
    ctx.fillStyle='#0d1a2e'; ctx.fillRect(CX,CY,CW,CH)
    ctx.strokeStyle='#D4AF37'; ctx.lineWidth=2; ctx.strokeRect(CX,CY,CW,CH)
    ctx.fillStyle='#D4AF37'; ctx.font='70px serif'; ctx.textAlign='center'
    ctx.fillText(book?.emoji||'📖',CX+CW/2,CY+CH/2+24); ctx.textAlign='left'
  }

  const RX=415; ctx.textAlign='left'
  ctx.fillStyle='rgba(212,175,55,.15)'; roundRect(ctx,RX,190,180,32,16); ctx.fill()
  ctx.fillStyle='#D4AF37'; ctx.font='bold 11px sans-serif'
  ctx.textAlign='center'; ctx.fillText('STEPBOOK',RX+90,211); ctx.textAlign='left'

  ctx.fillStyle='#FFF'; ctx.font='bold 34px "Georgia",serif'
  wrapTextL(ctx,bookTitle,RX,280,585,44,3)
  ctx.fillStyle='rgba(255,255,255,.55)'; ctx.font='400 21px sans-serif'
  ctx.fillText((book?.author||'').slice(0,45),RX,395)

  for(let i=0;i<5;i++){ctx.fillStyle=i<5?'#D4AF37':'rgba(255,255,255,.2)';ctx.font='26px serif';ctx.fillText('★',RX+i*32,440)}

  ctx.fillStyle='rgba(255,255,255,.1)'; roundRect(ctx,RX,466,540,8,4); ctx.fill()
  const pw=(S.progress/100)*540
  const pG=ctx.createLinearGradient(RX,0,RX+pw,0)
  pG.addColorStop(0,'#D4AF37'); pG.addColorStop(1,'#f5c842')
  ctx.fillStyle=pG; roundRect(ctx,RX,466,pw,8,4); ctx.fill()
  ctx.fillStyle='#D4AF37'; ctx.font='bold 15px sans-serif'
  ctx.fillText(`${S.progress}% lido`,RX,500)

  const dG=ctx.createLinearGradient(80,0,W-80,0)
  dG.addColorStop(0,'transparent'); dG.addColorStop(.2,'rgba(212,175,55,.6)')
  dG.addColorStop(.8,'rgba(212,175,55,.6)'); dG.addColorStop(1,'transparent')
  ctx.strokeStyle=dG; ctx.lineWidth=1
  ctx.beginPath(); ctx.moveTo(80,685); ctx.lineTo(W-80,685); ctx.stroke()

  const reflText = book?.reflections?.filter(r=>r.answered)?.[0]?.answer || `${S.progress}% do livro lido com leitura ativa pelo StepBook.`
  ctx.fillStyle='rgba(255,255,255,.78)'; ctx.font='italic 400 23px "Georgia",serif'
  wrapTextL(ctx,`"${reflText.slice(0,170)}"`,80,740,W-160,34,4)

  ctx.fillStyle='rgba(255,255,255,.28)'; ctx.font='400 15px sans-serif'
  ctx.textAlign='right'; ctx.fillText('stepbook.vercel.app',W-80,H-40)
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r)
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r)
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r)
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath()
}
function wrapTextL(ctx,text,x,y,mw,lh,ml=99){
  const ws=text.split(' '); let l='',cy=y,n=0
  for(const w of ws){const t=l+w+' ';if(ctx.measureText(t).width>mw&&l){ctx.fillText(l.trim(),x,cy);l=w+' ';cy+=lh;n++;if(n>=ml){ctx.fillText('…',x,cy);return}}else l=t}
  if(l)ctx.fillText(l.trim(),x,cy)
}

async function canvasToFile(canvas, title) {
  if (!canvas) return null
  return new Promise(r => canvas.toBlob(blob => r(blob ? new File([blob], `stepbook-${title.slice(0,20)}.png`, { type:'image/png' }) : null), 'image/png', 1.0))
}
function downloadCanvas(canvas, title, mode) {
  if (!canvas) return
  const a = document.createElement('a')
  a.href = canvas.toDataURL('image/png',1.0)
  a.download = `stepbook-${mode}-${title.replace(/\s+/g,'-').slice(0,30)}.png`
  a.click(); toast('Imagem salva! ✅')
}

function escHtml(s) {
  if (!s) return ''
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
